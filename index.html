<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
<title>IG 圖文產生器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@font-face{font-family:'CKS';src:url('ChiKuSung.otf') format('opentype');font-weight:normal;font-style:normal}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g:rgba(200,175,120,1);--gd:rgba(200,175,120,.6);--gf:rgba(200,175,120,.18);--cr:#ffffff;--red:#e8392b;--grey:rgba(210,205,195,.85)}
body{background:#0d0d0d;font-family:'Noto Serif TC','CKS','STSong',serif;display:flex;flex-direction:column;align-items:center;padding:28px 20px 120px;min-height:100vh}

/* ── topbar ── */
#topbar{width:100%;max-width:1220px;display:flex;align-items:center;gap:8px;background:#181818;border:1px solid #252525;padding:11px 16px;margin-bottom:22px;flex-wrap:wrap;border-radius:3px}
#topbar h1{font-size:15px;letter-spacing:.22em;color:var(--g);white-space:nowrap}
#ai{background:#111;border:1px solid #282828;color:#e0d8c8;font-family:'Noto Serif TC','CKS','STSong',serif;font-size:12px;letter-spacing:.07em;padding:6px 10px;outline:none;width:148px;flex-shrink:0;border-radius:2px}
#ai:focus,#it:focus{border-color:var(--gd)}
#it{flex:1;background:#111;border:1px solid #282828;color:#e0d8c8;font-family:'Noto Serif TC','CKS','STSong',serif;font-size:12px;letter-spacing:.06em;padding:6px 10px;outline:none;height:40px;resize:none;line-height:1.6;min-width:160px;border-radius:2px}
#ai::placeholder,#it::placeholder{color:rgba(200,175,120,.18)}
.tb{font-family:'Noto Serif TC','CKS','STSong',serif;font-size:12px;letter-spacing:.15em;padding:7px 13px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:opacity .2s,border-color .2s,color .2s;border-radius:2px}
#gb{background:var(--g);color:#0a0a0a;border:none}
#gb:hover{opacity:.85}#gb:disabled{opacity:.35;cursor:not-allowed}
#db{background:transparent;color:var(--gd);border:1px solid #383838;display:none}
#db:hover{border-color:var(--gd);color:var(--g)}
#bb{background:transparent;color:rgba(200,175,120,.4);border:1px solid #2a2a2a;font-size:11px}
#bb:hover{border-color:var(--gd);color:var(--g)}
#bgf{display:none}
#st{font-size:11px;letter-spacing:.1em;color:rgba(200,175,120,.4);white-space:nowrap}

/* ── theme bar ── */
#tbar{width:100%;max-width:1220px;display:none;margin-bottom:20px;background:#161616;border:1px solid #222;border-radius:3px;padding:10px 14px}
#tbar .tlbl{font-size:10px;letter-spacing:.22em;color:rgba(200,175,120,.35);margin-bottom:10px;display:block}
#tbar .chips{display:flex;gap:7px;flex-wrap:wrap;align-items:flex-end}
.chip{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:opacity .15s}
.chip:hover{opacity:.85}
.chip .prev{width:38px;height:48px;border-radius:2px;overflow:hidden;border:1.5px solid transparent;transition:border-color .15s;flex-shrink:0;position:relative}
.chip.on .prev{border-color:var(--g)}
.chip span{font-family:'Noto Serif TC','CKS','STSong',serif;font-size:9px;letter-spacing:.1em;color:rgba(200,175,120,.45);text-align:center;max-width:52px;line-height:1.4}
.chip.on span{color:var(--g)}
#tbar .note{font-size:10px;letter-spacing:.1em;color:rgba(200,175,120,.2);margin-top:8px}

/* ── per-slide theme switcher ── */
.slide-controls{
  position:absolute;top:-38px;right:0;
  display:flex;gap:4px;align-items:center;
}
.slide-tc{
  background:#1a1a1a;border:1px solid #2e2e2e;
  padding:3px 8px;cursor:pointer;border-radius:2px;
  font-family:'Noto Serif TC','CKS','STSong',serif;font-size:10px;letter-spacing:.12em;
  color:rgba(200,175,120,.45);transition:border-color .12s,color .12s;
  white-space:nowrap;
}
.slide-tc:hover{border-color:var(--gd);color:var(--g)}
.slide-tc.on{border-color:var(--g);color:var(--g);background:#222}
.slide-theme-label{font-size:10px;letter-spacing:.12em;color:rgba(200,175,120,.3);padding:0 4px}

/* ── floating toolbar ── */
#ftb{
  position:fixed;z-index:9999;display:none;
  background:#1d1d1d;border:1px solid #363636;
  box-shadow:0 8px 36px rgba(0,0,0,.85);
  padding:4px 7px;gap:1px;align-items:center;flex-wrap:wrap;
  max-width:760px;border-radius:4px;pointer-events:auto;
}
#ftb.on{display:flex}
.sp{width:1px;height:19px;background:#2e2e2e;flex-shrink:0;margin:0 2px}
.fn{background:transparent;border:1px solid transparent;color:rgba(200,175,120,.52);font-family:'Noto Serif TC','CKS','STSong',serif;font-size:11px;padding:3px 6px;cursor:pointer;border-radius:3px;white-space:nowrap;transition:all .1s;display:flex;align-items:center;line-height:1.4}
.fn:hover,.fn.on{background:#272727;border-color:#4a4a4a;color:var(--g)}
.fn.on{border-color:var(--gd)}
.fn.x{color:rgba(255,85,85,.5)}.fn.x:hover{background:rgba(255,40,40,.07);border-color:rgba(255,70,70,.3);color:#ff5555}
.fl{font-size:9px;letter-spacing:.1em;color:rgba(200,175,120,.28);padding:0 2px;white-space:nowrap}
.fst{display:flex;align-items:center;gap:1px}
.fst button{background:#0e0e0e;border:1px solid #272727;color:rgba(200,175,120,.42);width:17px;height:19px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;border-radius:2px;transition:background .1s;flex-shrink:0}
.fst button:hover{background:#272727;color:var(--g)}
.fst span{min-width:28px;text-align:center;font-size:11px;color:rgba(200,175,120,.68);letter-spacing:.03em}
.fco{width:20px;height:20px;border:1px solid #3e3e3e;cursor:pointer;border-radius:2px;padding:2px;background:#0e0e0e;flex-shrink:0}
.fsl{display:flex;align-items:center;gap:3px}
.fsl input[type=range]{width:65px;accent-color:var(--g);height:3px;cursor:pointer}
.fsl span{font-size:9px;color:rgba(200,175,120,.38);min-width:24px}
#gtx,#gdc,#gbg{display:none;align-items:center;gap:1px;flex-wrap:wrap}
#gtx.on,#gdc.on,#gbg.on{display:flex}

/* ── slides ── */
#wrap{display:flex;flex-direction:column;align-items:center;gap:52px;width:100%}
.slide{position:relative;width:1080px;height:1350px;overflow:visible;background:#0a0a0a;flex-shrink:0}
.si{position:absolute;inset:0;overflow:hidden;width:1080px;height:1350px}
.bg-el{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;cursor:pointer;image-rendering:-webkit-optimize-contrast}
.ov-el{position:absolute;inset:0;pointer-events:none}
.deco{cursor:pointer;transition:outline .1s}
.deco:hover{outline:2px dashed rgba(200,175,120,.28);outline-offset:3px}
.deco.sel{outline:2px dashed rgba(200,175,120,.82)!important;outline-offset:3px}
.ed{cursor:text;border-radius:2px;outline:2px solid transparent;outline-offset:3px;transition:outline .1s}
.ed:hover{outline:2px solid rgba(200,175,120,.2)}
.ed.sel{outline:2px solid rgba(200,175,120,.78)!important}
.ph{display:flex;align-items:center;justify-content:center;width:1080px;height:220px;background:#141414;border:1px dashed #242424;color:rgba(200,175,120,.16);font-size:14px;letter-spacing:.25em}

/* ════════════ T1 IMPERIAL ════════════ */
.t1{background:#0a0a0a}
.t1 .corner{position:absolute;width:40px;height:40px;border-color:rgba(200,175,120,.18);border-style:solid}
.t1 .tl{top:56px;left:56px;border-width:2px 0 0 2px}.t1 .tr{top:56px;right:56px;border-width:2px 2px 0 0}
.t1 .bl{bottom:56px;left:56px;border-width:0 0 2px 2px}.t1 .br{bottom:56px;right:56px;border-width:0 2px 2px 0}
.t1 .hl{position:absolute;left:56px;right:56px;height:1px;background:rgba(200,175,120,.13)}
.t1 .vl{position:absolute;left:100px;top:56px;bottom:56px;width:1px;background:rgba(200,175,120,.18)}
.t1 .cw{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:110px 100px}
.t1 .ey{font-size:30px;letter-spacing:.35em;color:var(--gd);margin-bottom:28px}
.t1 .tt{font-weight:900;word-break:keep-all;overflow-wrap:anywhere;font-size:96px;line-height:1.05;letter-spacing:.12em;color:var(--cr);text-shadow:0 4px 40px rgba(0,0,0,.7);display:block}
.t1 .tt.ac{color:var(--red)}
.t1 .sp2{width:100px;height:2px;margin:24px 0;background:linear-gradient(90deg,rgba(200,175,120,.6),transparent)}
.t1 .sb{font-size:48px;letter-spacing:.22em;color:var(--grey);line-height:1.85;margin-bottom:64px}
.t1 .ac2{font-size:28px;letter-spacing:.2em;color:var(--gd);border-top:1px solid rgba(200,175,120,.15);padding-top:14px}
.t1 .nw{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:110px 100px 110px 136px}
.t1 .nm{font-size:28px;letter-spacing:.3em;color:var(--gd);margin-bottom:44px}
.t1 .tg{display:inline-block;font-size:30px;letter-spacing:.3em;color:var(--g);border:1px solid rgba(200,175,120,.26);padding:5px 16px;margin-bottom:30px}
.t1 .hd{font-weight:900;word-break:keep-all;overflow-wrap:anywhere;font-size:56px;letter-spacing:.14em;color:#ffffff;line-height:1.18;margin-bottom:48px;text-shadow:0 3px 30px rgba(0,0,0,.6)}
.t1 .dv{width:64px;height:1px;margin-bottom:44px;background:rgba(200,175,120,.55)}
.t1 .pl{list-style:none;display:flex;flex-direction:column;gap:40px}
.t1 .pi{display:flex;align-items:flex-start;gap:44px}
.t1 .pn{font-size:34px;letter-spacing:.1em;color:var(--g);padding-top:6px;flex-shrink:0;width:44px;text-align:left;line-height:1;font-weight:900}
.t1 .ph2{font-weight:900;font-size:40px;letter-spacing:.08em;color:#ffffff;line-height:1.4}
.t1 .pd{font-size:28px;letter-spacing:.05em;color:var(--grey);line-height:1.75;margin-top:10px}
.t1 .ctw{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:96px}
.t1 .cd{font-size:30px;letter-spacing:.5em;color:var(--gd);margin-bottom:36px}
.t1 .cm{font-weight:900;font-size:96px;letter-spacing:.08em;color:var(--cr);line-height:1.2;text-shadow:0 4px 40px rgba(0,0,0,.7);margin-bottom:28px;word-break:keep-all;overflow-wrap:anywhere}
.t1 .cs{font-size:36px;letter-spacing:.08em;color:var(--grey);line-height:1.9;margin-bottom:48px;max-width:780px;word-break:keep-all;overflow-wrap:anywhere}
.t1 .cv{width:1px;height:56px;background:linear-gradient(to bottom,rgba(200,175,120,.55),transparent);margin:0 auto 36px}
.t1 .cb{border:1px solid rgba(200,175,120,.3);padding:16px 48px;margin-bottom:32px;max-width:840px;word-break:keep-all}
.t1 .cf{font-size:34px;letter-spacing:.12em;color:var(--g);word-break:keep-all;overflow-wrap:anywhere}
.t1 .ca{font-size:30px;letter-spacing:.2em;color:var(--gd)}

/* ════════════ T2 MINIMAL ════════════ */
.t2{background:#080808}





























/* ════════════ T3 EDITORIAL ════════════ */
.t3{background:#060606}





























/* ════════════ T4 NOIR ════════════ */
.t4{background:#030303}































/* ════════════ T5 WABI ════════════ */
.t5{background:#070707}



























/* ════════════ T6 CINNABAR 朱砂 ════════════ */
.t6{background:#0d0504}




























/* ════════════ T7 CELADON 石青 ════════════ */
.t7{background:#04070e}































/* ════════════ T8 PAPER 素白 ════════════ */
.t8{background:#f5f2ec}






























/* paper needs light bg for ov */


/* ── slide overlay labels ── */
.slide-logo{
  position:absolute;top:32px;right:40px;
  width:100px;height:100px;
  object-fit:contain;z-index:10;pointer-events:none;
  opacity:.92;
}
/* ── slide overlay labels ── */
.slide-hashtag{
  position:absolute;top:44px;left:52px;
  font-family:'Noto Serif TC','CKS','STSong',serif;font-size:16px;letter-spacing:.18em;
  color:rgba(200,175,120,.75);z-index:10;pointer-events:none;
}
.slide-watermark{
  position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  font-family:'Noto Serif TC','CKS','STSong',serif;font-size:16px;letter-spacing:.28em;
  color:rgba(200,175,120,.35);z-index:10;pointer-events:none;white-space:nowrap;
}
.slide-footer{
  position:absolute;bottom:28px;right:52px;
  font-family:'Noto Serif TC','CKS','STSong',serif;
  font-size:22px;letter-spacing:.2em;font-weight:700;
  color:rgba(200,175,120,.38);z-index:10;pointer-events:none;white-space:nowrap;
}

/* ── layout picker ── */
#lv-bar{width:100%;max-width:1220px;display:none;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap}
#lv-bar .lv-lbl{font-size:10px;letter-spacing:.2em;color:rgba(200,175,120,.35);white-space:nowrap}
.lv-btn{background:#1a1a1a;border:1px solid #2a2a2a;color:rgba(200,175,120,.4);font-family:inherit;font-size:10px;letter-spacing:.1em;padding:5px 10px;cursor:pointer;border-radius:2px;transition:all .15s;white-space:nowrap}
.lv-btn:hover{border-color:var(--gd);color:var(--g)}
.lv-btn.on{border-color:var(--g);color:var(--g);background:#222}

/* ══ Layout Variants — 8 種排版 ══ */

/* ── lv1 (idx=0): 左對齊·內容置中偏上 ── */
.lv1 .nw{justify-content:center;padding:100px 100px 100px 120px}
.lv1 .cw{justify-content:center;padding:100px 100px}

/* ── lv2 (idx=1): 置中·所有元素居中 ── */
.lv2 .cw{align-items:center;text-align:center;padding:110px 90px}
.lv2 .tt,.lv2 .sb,.lv2 .ey,.lv2 .ac2,.lv2 .bio{text-align:center}
.lv2 .sp2{margin:24px auto}
.lv2 .nw{align-items:center;text-align:center;padding:100px 90px}
.lv2 .hd,.lv2 .tg,.lv2 .nm{text-align:center}
.lv2 .dv{margin:0 auto 44px}
.lv2 .pl{align-items:center}
.lv2 .pi{flex-direction:column;align-items:center;text-align:center;gap:10px}
.lv2 .pn{width:auto;text-align:center}
.lv2 .ph2,.lv2 .pd{text-align:center}

/* ── lv3 (idx=2): 左對齊·標題在上·內容靠頂 ── */
.lv3 .cw{justify-content:flex-start;padding-top:160px;padding-left:100px;padding-right:100px}
.lv3 .bio{margin-bottom:18px}
.lv3 .nw{justify-content:flex-start;padding-top:140px;padding-left:120px;padding-right:100px}
.lv3 .hd{font-size:64px!important;margin-bottom:52px}
.lv3 .dv{display:none}
.lv3 .nm{margin-bottom:28px}

/* ── lv4 (idx=3): 左對齊·卡片式points ── */
.lv4 .nw{padding:80px 70px 80px 90px}
.lv4 .hd{font-size:52px!important;margin-bottom:36px}
.lv4 .dv{display:none}
.lv4 .pl{gap:0}
.lv4 .pi{padding:22px 26px;margin-bottom:14px;background:rgba(200,175,120,.05);border-left:3px solid rgba(200,175,120,.5);border-radius:0 4px 4px 0;gap:28px;align-items:flex-start}
.lv4 .pn{font-size:26px!important;color:var(--g)!important;width:32px;text-align:left}
.lv4 .ph2{font-size:34px!important;line-height:1.3}
.lv4 .pd{font-size:24px!important;margin-top:4px}

/* ── lv5 (idx=4): 置中·大標題·超衝擊 ── */
.lv5 .nw{align-items:center;text-align:center;padding:80px 80px;justify-content:center}
.lv5 .hd{font-size:72px!important;line-height:1.1;text-align:center;margin-bottom:52px}
.lv5 .tg{text-align:center}
.lv5 .nm{text-align:center}
.lv5 .dv{margin:0 auto 44px}
.lv5 .pl{align-items:center}
.lv5 .pi{flex-direction:column;align-items:center;text-align:center;gap:8px;max-width:800px}
.lv5 .pn{width:auto;text-align:center;font-size:30px!important;color:var(--g)!important}
.lv5 .ph2,.lv5 .pd{text-align:center}

/* ── lv6 (idx=5): 左對齊·內容靠底 ── */
.lv6 .nw{justify-content:flex-end;padding-bottom:110px;padding-left:120px;padding-right:100px;padding-top:80px}
.lv6 .nm{position:absolute;top:100px;left:120px;margin-bottom:0}
.lv6 .tg{position:absolute;top:155px;left:120px;margin-bottom:0}
.lv6 .hd{font-size:60px!important;margin-bottom:40px;border-top:2px solid rgba(200,175,120,.2);padding-top:32px}
.lv6 .dv{display:none}
.lv6 .pl{gap:28px}
.lv6 .cw{justify-content:flex-end;padding-bottom:140px;padding-left:100px;padding-right:100px}

/* ── 全版型：大數字頁碼浮水印（所有版本都有）── */
.t1 .nw::before,
.t1 .cw::before,
.t1 .ctw::before{
  content:attr(data-idx);
  position:absolute;
  font-size:480px;font-weight:900;
  color:rgba(200,175,120,.06);
  right:-40px;bottom:-100px;
  line-height:1;pointer-events:none;
  font-family:'Noto Serif TC','CKS','STSong',serif;
  letter-spacing:-.02em;
}

/* ── lv7 (idx=6): 左對齊·大數字更明顯 ── */
.lv7 .nw::before{font-size:560px;color:rgba(200,175,120,.08);right:-60px;bottom:-130px}
.lv7 .nw{padding:100px 100px 100px 120px;justify-content:center}
.lv7 .hd{font-size:60px!important;margin-bottom:44px}
.lv7 .pn{font-size:38px!important;color:rgba(200,175,120,.85)!important;font-weight:900}

/* ── lv8 (idx=7): 置中·標題特大·底留白 ── */
.lv8 .nw{align-items:center;text-align:center;justify-content:flex-start;padding:160px 80px 80px}
.lv8 .nm{text-align:center;margin-bottom:20px}
.lv8 .tg{text-align:center;margin-bottom:24px}
.lv8 .hd{font-size:76px!important;line-height:1.12;text-align:center;margin-bottom:56px;letter-spacing:.1em}
.lv8 .dv{margin:0 auto 48px;width:120px;height:3px;background:linear-gradient(90deg,transparent,var(--g),transparent)}
.lv8 .pl{align-items:center;gap:32px}
.lv8 .pi{flex-direction:column;align-items:center;text-align:center;gap:8px;max-width:820px}
.lv8 .pn{width:auto;text-align:center}
.lv8 .ph2,.lv8 .pd{text-align:center}

/* ── lv9 (idx=8): 卡片·置中·上下等分 ── */
.lv9 .nw{align-items:center;text-align:center;padding:80px 80px}
.lv9 .hd{font-size:54px!important;margin-bottom:36px;text-align:center}
.lv9 .tg,.lv9 .nm{text-align:center}
.lv9 .dv{display:none}
.lv9 .pl{gap:0;align-items:stretch;width:100%}
.lv9 .pi{padding:20px 32px;margin-bottom:12px;background:rgba(200,175,120,.05);border-left:3px solid rgba(200,175,120,.5);border-radius:0 4px 4px 0;gap:24px;align-items:center;text-align:left}
.lv9 .pn{font-size:26px!important;color:var(--g)!important;width:32px;flex-shrink:0}
.lv9 .ph2{font-size:34px!important;line-height:1.3}
.lv9 .pd{font-size:24px!important;margin-top:4px}

/* ── lv10 (idx=9): 卡片·靠底·號碼大且金色 ── */
.lv10 .nw{justify-content:flex-end;padding-bottom:100px;padding-left:100px;padding-right:80px;padding-top:80px}
.lv10 .nm{position:absolute;top:100px;left:100px;margin-bottom:0}
.lv10 .tg{position:absolute;top:155px;left:100px;margin-bottom:0}
.lv10 .hd{font-size:56px!important;margin-bottom:36px}
.lv10 .dv{display:none}
.lv10 .pl{gap:0}
.lv10 .pi{padding:20px 24px;margin-bottom:12px;background:rgba(200,175,120,.06);border-left:4px solid rgba(200,175,120,.6);border-radius:0 4px 4px 0;gap:24px;align-items:center}
.lv10 .pn{font-size:32px!important;color:var(--g)!important;font-weight:900;width:40px;flex-shrink:0}
.lv10 .ph2{font-size:32px!important;line-height:1.3}
.lv10 .pd{font-size:22px!important;margin-top:4px}

/* ── lv11 (idx=10): 卡片·分隔線取代左邊框·簡潔 ── */
.lv11 .nw{padding:90px 90px 90px 110px;justify-content:center}
.lv11 .hd{font-size:56px!important;margin-bottom:40px}
.lv11 .dv{display:none}
.lv11 .pl{gap:0}
.lv11 .pi{padding:24px 20px;border-bottom:1px solid rgba(200,175,120,.15);margin-bottom:0;gap:32px;align-items:flex-start;background:transparent}
.lv11 .pn{font-size:28px!important;color:rgba(200,175,120,.5)!important;width:36px;flex-shrink:0;padding-top:4px}
.lv11 .ph2{font-size:34px!important;line-height:1.3}
.lv11 .pd{font-size:24px!important;margin-top:6px}

/* ── lv12 (idx=11): 卡片·全框·暗底·最強存在感 ── */
.lv12 .nw{padding:70px 70px 70px 90px;justify-content:center}
.lv12 .hd{font-size:50px!important;margin-bottom:32px}
.lv12 .dv{display:none}
.lv12 .pl{gap:16px}
.lv12 .pi{padding:22px 28px;background:rgba(0,0,0,.45);border:1px solid rgba(200,175,120,.2);border-left:4px solid rgba(200,175,120,.7);border-radius:0 4px 4px 0;gap:28px;align-items:flex-start}
.lv12 .pn{font-size:28px!important;color:var(--g)!important;font-weight:900;width:36px;flex-shrink:0;padding-top:4px}
.lv12 .ph2{font-size:34px!important;line-height:1.3;color:#fff}
.lv12 .pd{font-size:23px!important;margin-top:6px;color:rgba(210,205,195,.8)}

/* ── manual slide controls ── */
.slide-outer{display:flex;flex-direction:column;align-items:flex-start;gap:0}
.slide-bar{display:flex;align-items:center;gap:5px;padding:5px 0;width:1080px;flex-wrap:wrap}
.slide-bar .slbl{font-size:10px;letter-spacing:.18em;color:rgba(200,175,120,.3)}
.slide-tc{background:#1a1a1a;border:1px solid #2a2a2a;padding:3px 7px;cursor:pointer;border-radius:2px;font-family:inherit;font-size:9px;letter-spacing:.12em;color:rgba(200,175,120,.38);transition:border-color .12s,color .12s;white-space:nowrap}
.slide-tc:hover{border-color:var(--gd);color:var(--g)}
.slide-tc.on{border-color:var(--g);color:var(--g);background:#222}
.del-slide{background:transparent;border:1px solid rgba(255,60,60,.2);color:rgba(255,80,80,.4);font-family:inherit;font-size:9px;letter-spacing:.1em;padding:3px 7px;cursor:pointer;border-radius:2px;transition:all .12s;margin-left:auto}
.del-slide:hover{border-color:rgba(255,60,60,.5);color:#ff5555;background:rgba(255,40,40,.06)}

/* ── mode toggle ── */
#mode-bar{width:100%;max-width:1220px;display:flex;align-items:center;gap:8px;margin-bottom:16px}
.mode-btn{font-family:inherit;font-size:12px;letter-spacing:.18em;padding:8px 20px;cursor:pointer;border-radius:2px;transition:all .15s}
.mode-btn.on{background:var(--g);color:#0a0a0a;border:none}
.mode-btn.off{background:transparent;color:rgba(200,175,120,.5);border:1px solid #333}
.mode-btn.off:hover{border-color:var(--gd);color:var(--g)}
#mode-note{font-size:10px;letter-spacing:.1em;color:rgba(200,175,120,.25)}

/* ── ai panel ── */
#ai-panel{width:100%;max-width:1220px;background:#161616;border:1px solid #222;border-radius:3px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#ai-panel.hidden{display:none}

/* ── manual panel ── */
#manual-panel{width:100%;max-width:1220px;background:#161616;border:1px solid #222;border-radius:3px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#manual-panel.hidden{display:none}

    .si *{text-shadow:2px 2px 0px rgba(0,0,0,.35), 0 4px 16px rgba(0,0,0,.55)}
    .slide-footer{text-shadow:none}
    .t1 .nw::before,
    .t1 .cw::before,
    .t1 .ctw::before{text-shadow:none}
</style>
</head>
<body>

<!-- AI panel -->
<div id="ai-panel">
  <h1 style="font-size:15px;letter-spacing:.22em;color:var(--g);white-space:nowrap">AI 產生</h1>
  <input id="groq-key" type="password" placeholder="貼上 Groq API Key (gsk_...)" 
    style="background:#111;border:1px solid #2e2e2e;color:#e0d8c8;font-family:inherit;font-size:11px;
    letter-spacing:.05em;padding:6px 10px;outline:none;width:220px;flex-shrink:0;border-radius:2px"
    oninput="saveKey(this.value)"/>
  <input id="ai" type="text" placeholder="@帳號" value="@angus061855" style="background:#111;border:1px solid #282828;color:#e0d8c8;font-family:inherit;font-size:12px;letter-spacing:.07em;padding:6px 10px;outline:none;width:148px;flex-shrink:0;border-radius:2px"/>
  <textarea id="it" placeholder="輸入主題或貼上文章…" style="flex:1;background:#111;border:1px solid #282828;color:#e0d8c8;font-family:inherit;font-size:12px;letter-spacing:.06em;padding:6px 10px;outline:none;height:40px;resize:none;line-height:1.6;min-width:160px;border-radius:2px"></textarea>
  <button class="tb" id="gb" onclick="doGen()" style="background:var(--g);color:#0a0a0a;border:none">✦ 產生</button>
  <button class="tb" id="rgb" style="display:none;background:transparent;color:rgba(200,175,120,.5);border:1px solid #333;font-size:11px" onclick="reGen()">↻ 換個版本</button>
  <span id="st" style="font-size:11px;letter-spacing:.1em;color:rgba(200,175,120,.4);white-space:nowrap"></span>
</div>

<!-- Theme bar -->
<div id="shared-bar" style="width:100%;max-width:1220px;display:flex;align-items:center;gap:8px;margin-bottom:8px">
  <button class="tb" id="bb" onclick="document.getElementById('bgf').click()" style="background:transparent;color:rgba(200,175,120,.4);border:1px solid #2a2a2a;font-size:11px">⊕ 換背景</button>
  <input type="file" id="bgf" accept="image/*" onchange="uploadBg(event)" style="display:none"/>
  <button class="tb" id="db" onclick="dlAll()" style="display:none;background:var(--g);color:#0a0a0a;border:none">↓ 下載全部 (ZIP)</button>
</div>

<!-- Layout variant picker -->
<div id="lv-bar">
  <span class="lv-lbl">排版：</span>
  <button class="lv-btn on" data-lv="0" onclick="setLayoutVariant(0)">① 標準左</button>
  <button class="lv-btn" data-lv="1" onclick="setLayoutVariant(1)">② 置中</button>
  <button class="lv-btn" data-lv="2" onclick="setLayoutVariant(2)">③ 標題置頂</button>
  <button class="lv-btn" data-lv="3" onclick="setLayoutVariant(3)">④ 卡片·左框</button>
  <button class="lv-btn" data-lv="4" onclick="setLayoutVariant(4)">⑤ 大標置中</button>
  <button class="lv-btn" data-lv="5" onclick="setLayoutVariant(5)">⑥ 靠底</button>
  <button class="lv-btn" data-lv="6" onclick="setLayoutVariant(6)">⑦ 大數字</button>
  <button class="lv-btn" data-lv="7" onclick="setLayoutVariant(7)">⑧ 超大標</button>
  <button class="lv-btn" data-lv="8" onclick="setLayoutVariant(8)">⑨ 卡片·置中</button>
  <button class="lv-btn" data-lv="9" onclick="setLayoutVariant(9)">⑩ 卡片·靠底</button>
  <button class="lv-btn" data-lv="10" onclick="setLayoutVariant(10)">⑪ 卡片·分隔線</button>
  <button class="lv-btn" data-lv="11" onclick="setLayoutVariant(11)">⑫ 卡片·全框</button>
  <button class="lv-btn" data-lv="12" onclick="setLayoutVariant(12)">🎲 隨機</button>
</div>
<div id="tbar" style="display:none">
  <span class="tlbl">整體風格 — 點選套用全部頁面</span>
  <div class="chips" id="chips"></div>
  <div class="note">切換後可繼續個別調整每張風格 ↓</div>
</div>

<!-- Floating toolbar -->
<div id="ftb">
  <span id="gtx">
    <button class="fn" id="bb2" onclick="fmt('b')"><b>B</b></button>
    <button class="fn" id="bs2" onclick="fmt('s')"><s>S</s></button>
    <div class="sp"></div>
    <span class="fl">選取色</span>
    <input type="color" class="fco" id="fcs" value="#c8af78" oninput="fmt('c',this.value)"/>
    <div class="sp"></div>
    <span class="fl">字級</span>
    <div class="fst"><button onclick="adj('fs',-2)">−</button><span id="vfs">28px</span><button onclick="adj('fs',2)">＋</button></div>
    <div class="sp"></div>
    <span class="fl">字距</span>
    <div class="fst"><button onclick="adj('ls',-1)">−</button><span id="vls">0px</span><button onclick="adj('ls',1)">＋</button></div>
    <div class="sp"></div>
    <span class="fl">行高</span>
    <div class="fst"><button onclick="adj('lh',-.1)">−</button><span id="vlh">1.5</span><button onclick="adj('lh',.1)">＋</button></div>
    <div class="sp"></div>
    <span class="fl">全色</span>
    <input type="color" class="fco" id="fca" oninput="adj('col',this.value)"/>
    <div class="sp"></div>
    <span class="fl">透明</span>
    <div class="fsl"><input type="range" id="fop" min="0" max="100" step="1" value="100" oninput="adj('op',this.value)"/><span id="vop">100%</span></div>
    <div class="sp"></div>
    <button class="fn x" onclick="delEl()">✕</button>
  </span>
  <span id="gdc">
    <span class="fl" id="dlbl">線條</span>
    <div class="sp"></div>
    <span class="fl">顏色</span>
    <input type="color" class="fco" id="fdc" value="#c8af78" oninput="da('col',this.value)"/>
    <div class="sp"></div>
    <span class="fl">透明</span>
    <div class="fsl"><input type="range" id="fdo" min="0" max="100" step="1" value="100" oninput="da('op',this.value)"/><span id="vdo">100%</span></div>
    <div class="sp"></div>
    <span class="fl">粗細</span>
    <div class="fst"><button onclick="da('sz',-1)">−</button><span id="vdsz">1</span><button onclick="da('sz',1)">＋</button></div>
    <span class="fl" id="dwl" style="display:none">寬</span>
    <div class="fst" id="dwc" style="display:none"><button onclick="da('w',-10)">−</button><span id="vdw">64</span><button onclick="da('w',10)">＋</button></div>
    <div class="sp"></div>
    <button class="fn x" onclick="delEl()">✕</button>
  </span>
  <span id="gbg">
    <span class="fl">背景</span>
    <div class="fsl"><input type="range" id="fbg" min="0" max="100" step="1" value="50" oninput="ba('bg',this.value)"/><span id="vbg">50%</span></div>
    <div class="sp"></div>
    <span class="fl">遮罩</span>
    <div class="fsl"><input type="range" id="fov" min="0" max="100" step="1" value="100" oninput="ba('ov',this.value)"/><span id="vov">100%</span></div>
  </span>
</div>

<div id="wrap"><div class="ph">輸入內容後按「✦ 產生」</div></div>

<script>
/* ─── data ─── */
const THEMES=[];

let SEL=null,SMODE='txt',savedSel=null;
let BGU='url("https://angus061855.github.io/ig-post-media-/back2.png")';
let lastInput='',lastAccount='';
let currentData=null;
let globalTheme='t1';
let slideThemes={};
const E=id=>document.getElementById(id);
const SS=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
const SG=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v;};
const stat=m=>{const el=document.getElementById('st');if(el)el.textContent=m;};

function applyGlobalTheme(tid){
  globalTheme=tid;
  if(!currentData)return;
  desel();
  // Apply to all slides
  document.querySelectorAll('.si').forEach(si=>{
    const sid=si.closest('.slide')?.id;
    if(sid){
      slideThemes[sid]=tid;
      si.className='si '+tid;
    }
  });
  // Rebuild overlay for paper theme
  document.querySelectorAll('.ov-el').forEach(ov=>{
    if(tid==='t8'){ov.style.cssText='position:absolute;inset:0;pointer-events:none;opacity:0'}
    else{ov.style.cssText=`position:absolute;inset:0;pointer-events:none;background:linear-gradient(160deg,rgba(0,0,0,.88) 0%,rgba(14,10,6,.7) 50%,rgba(0,0,0,.93) 100%);opacity:1`}
  });
  updateSlideBadges();
  stat('✓ 已套用 '+THEMES.find(t=>t.id===tid).name);
}

/* ─── per-slide theme ─── */
function setSlidTheme(slideId, tid){
  slideThemes[slideId]=tid;
  const slide=document.getElementById(slideId);
  if(!slide)return;
  const si=slide.querySelector('.si');
  si.className='si '+tid;
  const ov=si.querySelector('.ov-el');
  if(ov){
    if(tid==='t8'){ov.style.cssText='position:absolute;inset:0;pointer-events:none;opacity:0'}
    else{ov.style.cssText=`position:absolute;inset:0;pointer-events:none;background:linear-gradient(160deg,rgba(0,0,0,.88) 0%,rgba(14,10,6,.7) 50%,rgba(0,0,0,.93) 100%);opacity:1`}
  }
  updateSlideBadges();
  desel();
}

function updateSlideBadges(){
  document.querySelectorAll('.slide').forEach(s=>{
    const ctrl=s.querySelector('.slide-controls');
    if(!ctrl)return;
    const sid=s.id;
    const tid=slideThemes[sid]||globalTheme;
    ctrl.querySelectorAll('.slide-tc').forEach(tc=>{
      tc.classList.toggle('on',tc.dataset.t===tid);
    });
  });
}

/* ─── bg upload ─── */
function uploadBg(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{BGU=`url("${ev.target.result}")`;document.querySelectorAll('.bg-el').forEach(b=>b.style.backgroundImage=BGU);stat('✓ 背景已更新')};
  r.readAsDataURL(f);e.target.value='';
}

/* ─── toolbar ─── */
function posTB(e){
  const tb=E('ftb');
  const r=e.getBoundingClientRect();
  let top=r.top-42+window.scrollY;
  if(top<52)top=r.bottom+6+window.scrollY;
  tb.style.top=Math.max(6,top)+'px';
  tb.style.left=Math.max(6,Math.min(r.left+window.scrollX,window.innerWidth-780))+'px';
  tb.classList.add('on');
}
function hideTB(){E('ftb').classList.remove('on')}
function repTB(){if(SEL)posTB(SEL)}

function showTB(e,mode){
  SEL=e;SMODE=mode;
  E('gtx').className='gtx'+(mode==='txt'?' on':'');
  E('gdc').className='gdc'+(mode==='deco'?' on':'');
  E('gbg').className='gbg'+(mode==='bg'?' on':'');
  posTB(e);
  if(mode==='txt')syncTxt(e);
  else if(mode==='deco')syncDeco(e);
  else if(mode==='bg')syncBg(e);
}

function syncTxt(e){
  const cs=getComputedStyle(e);
  const fs=parseFloat(cs.fontSize)||28;
  const ls=parseFloat(cs.letterSpacing)||0;
  const lh=parseFloat(cs.lineHeight)||(fs*1.5);
  SS('vfs',Math.round(fs)+'px');
  SS('vls',Math.round(ls)+'px');
  SS('vlh',(Math.round(lh/fs*10)/10).toFixed(1));
  const rgb=cs.color.match(/[\d.]+/g);
  if(rgb&&rgb.length>=3)SG('fca','#'+[rgb[0],rgb[1],rgb[2]].map(v=>parseInt(v).toString(16).padStart(2,'0')).join(''));
  const op=Math.round((parseFloat(e.style.opacity)||1)*100);
  SG('fop',op);SS('vop',op+'%');
  E('bb2').classList.toggle('on',cs.fontWeight==='700');
  E('bs2').classList.toggle('on',cs.textDecoration.includes('line-through'));
}

function dType(e){
  const c=(e.className||'').toString();
  if(c.includes('corner'))return 'corner';
  if(c.includes('hl ')||c.includes('hl\n')||/ hl$/.test(c)||c==='hl deco sel'||c.trim().split(' ').includes('hl'))return 'hl';
  if(c.includes('vl ')||c.includes('vl\n')||/ vl$/.test(c)||c.trim().split(' ').includes('vl'))return 'vl';
  if(c.includes('sb2'))return 'sb2';
  if(c.includes('rl'))return 'rl';
  if(c.includes('sp2'))return 'sp2';
  if(c.includes('dv'))return 'dv';
  if(c.includes('cv'))return 'cv';
  if(c.includes('nm'))return 'num';
  if(c.includes('cd'))return 'dots';
  if(c.includes('pn'))return 'pnum';
  if(c.includes('cb'))return 'cbox';
  return 'other';
}

function syncDeco(e){
  const t=dType(e);
  const lm={corner:'角框',hl:'橫線',vl:'直線',sb2:'側邊條',rl:'右側條',sp2:'分隔線',dv:'分隔線',cv:'垂直線',num:'頁碼',dots:'裝飾點',pnum:'序號',cbox:'邊框',other:'裝飾'};
  SS('dlbl',lm[t]||'裝飾');
  const cs=getComputedStyle(e);
  const op=Math.round((parseFloat(e.style.opacity)||1)*100);
  SG('fdo',op);SS('vdo',op+'%');
  const isT=['num','dots','pnum'].includes(t);
  const isL=['hl','vl','sp2','dv','cv','sb2','rl'].includes(t);
  let hex='#c8af78';
  if(isT){const rgb=cs.color.match(/[\d.]+/g);if(rgb&&rgb.length>=3)hex='#'+[rgb[0],rgb[1],rgb[2]].map(v=>parseInt(v).toString(16).padStart(2,'0')).join('');}
  else if(isL){const rgb=(cs.backgroundColor||'').match(/[\d.]+/g);if(rgb&&rgb.length>=3)hex='#'+[rgb[0],rgb[1],rgb[2]].map(v=>parseInt(v).toString(16).padStart(2,'0')).join('');}
  else if(t==='corner'){const rgb=cs.borderTopColor.match(/[\d.]+/g);if(rgb&&rgb.length>=3)hex='#'+[rgb[0],rgb[1],rgb[2]].map(v=>parseInt(v).toString(16).padStart(2,'0')).join('');}
  else if(t==='cbox'){const rgb=cs.borderTopColor.match(/[\d.]+/g);if(rgb&&rgb.length>=3)hex='#'+[rgb[0],rgb[1],rgb[2]].map(v=>parseInt(v).toString(16).padStart(2,'0')).join('');}
  SG('fdc',hex);
  const sz=isT?Math.round(parseFloat(cs.fontSize)||16):t==='corner'?Math.round(parseFloat(cs.borderTopWidth)||1):1;
  SS('vdsz',sz);
  const sw=['sp2','dv','hl'].includes(t);
  E('dwl').style.display=sw?'':'none';
  E('dwc').style.display=sw?'flex':'none';
  if(sw)SS('vdw',Math.round(parseFloat(cs.width)||64));
}

function syncBg(e){
  const si=e.closest('.si');
  const bg=si?.querySelector('.bg-el'),ov=si?.querySelector('.ov-el');
  if(bg){const v=Math.round((parseFloat(bg.style.opacity)||.5)*100);SG('fbg',v);SS('vbg',v+'%')}
  if(ov){const v=Math.round((parseFloat(ov.style.opacity)||1)*100);SG('fov',v);SS('vov',v+'%')}
}

/* ─── partial selection ─── */
function saveSel(){const s=window.getSelection();if(s&&s.rangeCount>0&&!s.isCollapsed){savedSel=s.getRangeAt(0).cloneRange();return true}return false}
function restSel(){if(!savedSel)return false;const s=window.getSelection();s.removeAllRanges();s.addRange(savedSel);return true}
E('ftb').addEventListener('mousedown',()=>saveSel());

/* ─── format ─── */
function fmt(cmd,val){
  restSel();
  const sel=window.getSelection();
  const has=sel&&!sel.isCollapsed&&SEL&&SEL.contains(sel.anchorNode);
  if(cmd==='b'){
    if(has)document.execCommand('bold',false,null);
    else if(SEL){const w=getComputedStyle(SEL).fontWeight;SEL.style.fontWeight=(w==='700'||w==='bold')?'normal':'bold';}
    E('bb2').classList.toggle('on',getComputedStyle(SEL||document.body).fontWeight==='700');
  }else if(cmd==='s'){
    if(has)document.execCommand('strikeThrough',false,null);
    else if(SEL){const d=getComputedStyle(SEL).textDecoration;SEL.style.textDecoration=d.includes('line-through')?'none':'line-through';}
    E('bs2').classList.toggle('on',getComputedStyle(SEL||document.body).textDecoration.includes('line-through'));
  }else if(cmd==='c'&&has){
    document.execCommand('foreColor',false,val);
  }
}

function adj(prop,val){
  if(!SEL)return;
  const cs=getComputedStyle(SEL);
  if(prop==='fs'){const v=Math.max(8,parseFloat(cs.fontSize)+val);SEL.style.fontSize=v+'px';SS('vfs',Math.round(v)+'px');repTB()}
  else if(prop==='ls'){const v=parseFloat(cs.letterSpacing)+val;SEL.style.letterSpacing=v+'px';SS('vls',Math.round(v)+'px')}
  else if(prop==='lh'){const fs=parseFloat(cs.fontSize)||28;const lh=parseFloat(cs.lineHeight)||(fs*1.5);const r=Math.max(.8,Math.round((lh/fs+val)*10)/10);SEL.style.lineHeight=r;SS('vlh',r.toFixed(1))}
  else if(prop==='col')SEL.style.color=val;
  else if(prop==='op'){SEL.style.opacity=val/100;SS('vop',val+'%')}
}

function da(prop,val){
  if(!SEL)return;
  const t=dType(SEL);
  const isT=['num','dots','pnum'].includes(t);
  const isL=['hl','vl','sp2','dv','cv','sb2','rl'].includes(t);
  if(prop==='col'){
    if(isT)SEL.style.color=val;
    else if(isL){SEL.style.background=val;SEL.style.backgroundColor=val;}
    else if(t==='corner'||t==='cbox')SEL.style.borderColor=val;
  }else if(prop==='op'){SEL.style.opacity=val/100;SS('vdo',val+'%')}
  else if(prop==='sz'){
    if(isT){const v=Math.max(8,parseFloat(getComputedStyle(SEL).fontSize)+val);SEL.style.fontSize=v+'px';SS('vdsz',Math.round(v))}
    else if(t==='corner'){const bw=Math.max(1,(parseFloat(SEL.style.borderTopWidth)||1)+val);SEL.style.borderWidth=bw+'px';SS('vdsz',Math.round(bw));const sz=Math.max(14,(parseFloat(getComputedStyle(SEL).width)||36)+val*2);SEL.style.width=sz+'px';SEL.style.height=sz+'px';}
    else if(isL){const p=['hl','sp2','dv'].includes(t)?'height':'width';const v=Math.max(1,(parseFloat(SEL.style[p])||1)+val);SEL.style[p]=v+'px';SS('vdsz',Math.round(v))}
  }else if(prop==='w'){const v=Math.max(10,(parseFloat(getComputedStyle(SEL).width)||64)+val);SEL.style.width=v+'px';SS('vdw',Math.round(v))}
}

function ba(prop,val){

/* ─── attach to slide ─── */
function att(slideEl){
  const si=slideEl.querySelector('.si');
  si.querySelectorAll('.ed').forEach(e=>{
    e.setAttribute('contenteditable','true');
    e.setAttribute('spellcheck','false');
    e.addEventListener('mousedown',ev=>{
      ev.stopPropagation();
      if(SEL===e){setTimeout(()=>showTB(e,'txt'),0);return;}
      selEl(e,'txt');
    });
    e.addEventListener('mouseup',ev=>{ev.stopPropagation();setTimeout(()=>showTB(e,'txt'),0)});
    e.addEventListener('keydown',ev=>{if(ev.key==='Escape')ev.target.blur()});
    e.addEventListener('input',repTB);
  });
  si.querySelectorAll('.deco').forEach(e=>{
    e.addEventListener('mousedown',ev=>{
      ev.stopPropagation();
      selEl(e,e.classList.contains('bg-el')?'bg':'deco');
    });
  });
}

let regenCount = 0;

async function reGen(){
  if(!lastInput){stat('請先產生一次內容');return;}
  regenCount++;
  const btn=E('rgb');btn.disabled=true;
  E('gb').disabled=true;
  stat(`重新生成第 ${regenCount} 個版本…`);
  desel();

  // Append variation instruction to push different angle
  const variations = [
    '\n\n請用完全不同的切入角度、不同的標題和重點，重新規劃這個主題。',
    '\n\n這次從「常見誤解」的角度切入，打破錯誤認知。',
    '\n\n這次用「數字說話」，盡量加入具體數字、金額、比例。',
    '\n\n這次從「新手常犯的錯」角度切入，列出會吃虧的決策。',
    '\n\n這次語氣更直接犀利，用更強烈的對比和反問。',
    '\n\n這次從「老手才知道」的內行視角切入，強調只有圈內人才懂的事。',
  ];
  const hint = variations[(regenCount - 1) % variations.length];
  const modifiedInput = lastInput + hint;

  const cfg = getCfg();
  try{
    let text = await callAPI(modifiedInput, null, 5000);
    let data = parseJSON(text);
    if(!data){
      text = await callAPI(modifiedInput, buildFallbackPrompt(lastInput, cfg), 3000);
      data = parseJSON(text);
    }
    if(!data){stat('⚠ 重新生成失敗，再試一次');return;}
    window._layoutVariant=Math.floor(Math.random()*8);
    render(data, lastAccount, 't1');
    document.querySelectorAll('.bg-el').forEach(b=>b.style.backgroundImage=BGU);
    stat(`✓ 第 ${regenCount} 個版本 · 不滿意繼續按「↻ 換個版本」`);
  }catch(e){stat('錯誤：'+e.message);}
  finally{btn.disabled=false;E('gb').disabled=false;}
}

/* ─── generate ─── */

function saveKey(v){
  if(v) localStorage.setItem('groq_key', v);
}
function loadKey(){
  const k=localStorage.getItem('groq_key')||'';
  if(k){ const inp=document.getElementById('groq-key'); if(inp) inp.value=k; }
  return k;
}

async function callAPI(inp,sys,max){
  const key = document.getElementById('groq-key')?.value.trim() || loadKey();
  if(!key){
    stat('⚠ 請先填入 Groq API Key');
    throw new Error('No API key');
  }
  const systemPrompt = sys || buildPrompt(inp, getCfg());
  const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({
      model:'meta-llama/llama-4-scout-17b-16e-instruct',
      max_tokens:max||5000,
      messages:[
        {role:'system',content:systemPrompt},
        {role:'user',content:inp}
      ]
    })
  });
  const j=await r.json();
  if(j.error) throw new Error(j.error.message||'Groq error');
  return j.choices?.[0]?.message?.content||'';
}

function parseJSON(text){
  const s=text.indexOf('{'),e2=text.lastIndexOf('}');
  if(s===-1||e2===-1)return null;
  try{return JSON.parse(text.slice(s,e2+1))}catch(e){return null}
}

  const inp=E('it').value.trim();

  if(!inp){stat('請輸入主題或文章');return}
  lastInput=inp;lastAccount=account;
  E('gb').disabled=true;stat('AI 規劃中…');desel();
  try{
    const cfg=getCfg();
    let text=await callAPI(inp,null,5000);
    let data=parseJSON(text);
    if(!data){
      stat('備用方案中…');
      text=await callAPI(inp,buildFallbackPrompt(inp,cfg),3000);
      data=parseJSON(text);
    }
    if(!data){stat('⚠ 生成失敗，請換個說法');return;}
    window._layoutVariant=Math.floor(Math.random()*8);
    render(data,account,'t1');
    genCaption(inp);
    stat('✓ 完成 · 文案生成中，下載 ZIP 時會一併包含 ig_caption.txt');
  }catch(e){stat('錯誤：'+e.message);console.error(e)}
  finally{E('gb').disabled=false}
}

/* ─── download ─── */
async function renderSlideCanvas(si){
  si.querySelectorAll('.ed,.deco').forEach(e=>e.style.outline='none');
  const c=await html2canvas(si,{scale:1,useCORS:true,allowTaint:true,width:1080,height:1350,backgroundColor:'#0a0a0a',logging:false});
  si.querySelectorAll('.ed,.deco').forEach(e=>e.style.outline='');
  return c;
}

// ZIP download — all at once
async function dlAll(){
  const slides=document.querySelectorAll('.slide');if(!slides.length)return;
  desel();
  const btn=E('db');btn.disabled=true;
  stat('打包中，請稍候…');
  try{
    // load JSZip dynamically
    if(!window.JSZip){
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
        s.onload=res;s.onerror=rej;document.head.appendChild(s);
      });
    }
    const zip=new JSZip();
    for(let i=0;i<slides.length;i++){
      stat(`處理第 ${i+1} / ${slides.length} 張…`);
      const si=slides[i].querySelector('.si');
      const canvas=await renderSlideCanvas(si);
      const blob=await new Promise(res=>canvas.toBlob(res,'image/png'));
      zip.file(`slide-${i+1}.png`,blob);
    }
    if(captionTxt){
      zip.file('ig_caption.txt', captionTxt);
}
    stat('壓縮中…');
    const zipBlob=await zip.generateAsync({type:'blob'});

    const a=document.createElement('a');
    a.href=URL.createObjectURL(zipBlob);
    a.download='ig_slides.zip';
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    stat('✓ ig_slides.zip 已下載');
  }catch(e){stat('下載失敗：'+e.message);console.error(e);}
  finally{btn.disabled=false;}
}



/* ════ MANUAL MODE ════ */
let currentMode = 'ai';
let slideCount2 = 0;
let slideIds2 = [];

function setMode(mode){
  currentMode = mode;
  document.getElementById('ai-panel').classList.toggle('hidden', mode!=='ai');
  document.getElementById('manual-panel').classList.toggle('hidden', mode!=='manual');
  document.getElementById('mbtn-ai').className = 'mode-btn '+(mode==='ai'?'on':'off');
  document.getElementById('mbtn-manual').className = 'mode-btn '+(mode==='manual'?'on':'off');
  if(mode==='manual' && document.querySelectorAll('.slide').length===0){
    initDefault();
  }
}

const SLIDE_TYPES=[
  {key:'cover',label:'封面'},
  {key:'content',label:'內容'},
  {key:'cta',label:'結尾CTA'},
];

const DEFAULT_CONTENT={
  cover:{ey:'TOPIC · INSIGHT · REALITY',t1:'主題',t2:'大標',sb:'點出核心問題\n一句話說清楚',ac:'@your.account'},
  content:{nm:'01 / 03',tg:'類別',hd:'標題',pts:[{t:'重點一',d:'說明文字'},{t:'重點二',d:'說明文字'},{t:'重點三',d:'說明文字'}]},
  cta:{cm:'行動呼籲',cs:'說清楚私訊能得到什麼\n不要模糊',cf:'追蹤帳號獲取更多',ca:'@your.account'},
};

function bgD2(thm){return`<div class="bg-el deco" style="background-image:${BGU};opacity:${thm==='t8'?'.85':'.5'}"></div>`}
function ovD2(thm){return`<div class="ov-el" style="position:absolute;inset:0;pointer-events:none;background:linear-gradient(160deg,rgba(0,0,0,.88) 0%,rgba(14,10,6,.7) 50%,rgba(0,0,0,.93) 100%);opacity:${thm==='t8'?'0':'1'}"></div>`}

function tDeco2(thm,type){
  const C=`<div class="corner tl deco"></div><div class="corner tr deco"></div><div class="corner bl deco"></div><div class="corner br deco"></div>`;
  const HL=`<div class="hl deco" style="top:130px"></div><div class="hl deco" style="bottom:130px"></div>`;
  if(thm==='t1')return type==='content'?C+`<div class="vl deco"></div>`:C+HL;
  if(thm==='t2')return C;
  if(thm==='t3')return`<div class="sb2 deco"></div>`+(type==='cover'?`<div class="hl deco" style="top:60px"></div>`:'');
  if(thm==='t4')return type==='cover'?C+`<div class="hl deco" style="top:76px"></div><div class="hl deco" style="bottom:76px"></div>`:C;
  if(thm==='t5')return`<div class="vl deco"></div>`;
  if(thm==='t6')return`<div class="rl deco"></div>`+(type!=='content'?`<div class="hl deco" style="top:110px"></div><div class="hl deco" style="bottom:110px"></div>`:'');
  if(thm==='t7')return type==='content'?C+`<div class="vl deco"></div>`:C+HL;
  if(thm==='t8')return type==='content'?C+`<div class="vl deco"></div>`:C;
  return'';
}

function coverHTML2(thm,d){
  d=d||DEFAULT_CONTENT.cover;
  const extra=thm==='t3'?`<div class="ac2 ed">${d.ac}</div>`:'';
  return`${bgD2(thm)}${ovD2(thm)}${tDeco2(thm,'cover')}${extra}
    <div class="cw">
      <div class="ey ed">${d.ey}</div>
      <div><span class="tt ed">${d.t1}</span><span class="tt ac ed">${d.t2}</span></div>
      <div class="sp2 deco"></div>
      <div class="sb ed">${(d.sb||'').replace(/\n/g,'<br>')}</div>
      <div class="ac2 ed">${d.ac}</div>
    </div>`;
}
function contentHTML2(thm,d,idx,total){
  d=d||DEFAULT_CONTENT.content;
  const num=String(idx+1).padStart(2,'0')+' / '+String(total||3).padStart(2,'0');
  const pts=(d.pts||[{t:'重點',d:'說明'},{t:'重點',d:'說明'},{t:'重點',d:'說明'}]).map((p,i)=>`
    <li class="pi"><span class="pn deco">0${i+1}</span>
      <div><div class="ph2 ed">${p.t}</div><div class="pd ed">${p.d}</div></div></li>`).join('');
  return`${bgD2(thm)}${ovD2(thm)}${tDeco2(thm,'content')}
    <div class="nw">
      <div class="nm deco">${num}</div>
      <div class="tg ed">${d.tg}</div>
      <div class="hd ed">${(d.hd||'').replace(/\n/g,'<br>')}</div>
      <div class="dv deco"></div>
      <ul class="pl">${pts}</ul>
    </div>`;
}
function ctaHTML2(thm,d){
  d=d||DEFAULT_CONTENT.cta;
  return`${bgD2(thm)}${ovD2(thm)}${tDeco2(thm,'cta')}
    <div class="ctw">
      <div class="cd deco">◆ ◆ ◆</div>
      <div class="cm ed">${(d.cm||'').replace(/\n/g,'<br>')}</div>
      <div class="cs ed">${(d.cs||'').replace(/\n/g,'<br>')}</div>
      <div class="cv deco"></div>
      <div class="cb deco"><div class="cf ed">${d.cf||''}</div></div>
      <div class="ca ed">${d.ca||''}</div>
    </div>`;
}

function addSlide(type,data,thm){
  type=type||'content'; thm=thm||globalTheme;
  slideCount2++;
  const id='mslide-'+slideCount2;
  slideIds2.push(id);

  const outer=document.createElement('div');outer.className='slide-outer';outer.id='outer-'+id;

  const bar=document.createElement('div');bar.className='slide-bar';
  bar.innerHTML=`<span class="slbl">第${document.querySelectorAll('.slide').length+1}張</span>`;

  SLIDE_TYPES.forEach(st=>{
    const btn=document.createElement('button');
    btn.className='slide-tc'+(st.key===type?' on':'');
    btn.textContent=st.label;btn.dataset.stype=st.key;
    btn.onclick=()=>changeSlideType2(id,st.key,bar);
    bar.appendChild(btn);
  });

  const tlbl=document.createElement('span');tlbl.className='slbl';tlbl.style.marginLeft='6px';tlbl.textContent='風格';
  bar.appendChild(tlbl);
  THEMES.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='slide-tc'+(t.id===thm?' on':'');
    btn.textContent=t.name;btn.dataset.t=t.id;
    btn.onclick=()=>{
      const si=document.querySelector('#'+id+' .si');if(!si)return;
      si.className='si '+t.id;
      const ov=si.querySelector('.ov-el');if(ov)ov.style.opacity=t.id==='t8'?'0':'1';
      bar.querySelectorAll('.slide-tc[data-t]').forEach(b=>b.classList.toggle('on',b.dataset.t===t.id));
      desel();
    };
    bar.appendChild(btn);
  });

  const delBtn=document.createElement('button');delBtn.className='del-slide';delBtn.textContent='✕ 刪除此頁';
  delBtn.onclick=()=>{outer.remove();slideIds2=slideIds2.filter(x=>x!==id);updateMCount();};
  bar.appendChild(delBtn);
  outer.appendChild(bar);

  const slide=document.createElement('div');slide.className='slide';slide.id=id;
  const si=document.createElement('div');si.className='si '+thm;
  si.innerHTML=type==='cover'?coverHTML2(thm,data):type==='cta'?ctaHTML2(thm,data):contentHTML2(thm,data,0,3);
  slide.appendChild(si);outer.appendChild(slide);
  E('wrap').appendChild(outer);
  att(slide);
  updateMCount();
  E('db').style.display='block';
}

function changeSlideType2(id,newType,bar){
  const slide=document.getElementById(id);if(!slide)return;
  const si=slide.querySelector('.si');
  const thm=[...si.classList].find(c=>c.startsWith('t')&&c.length<=2)||globalTheme;
  si.innerHTML=newType==='cover'?coverHTML2(thm):newType==='cta'?ctaHTML2(thm):contentHTML2(thm,null,0,3);
  att(slide);
  bar.querySelectorAll('.slide-tc[data-stype]').forEach(b=>b.classList.toggle('on',b.dataset.stype===newType));
  desel();
}

function updateMCount(){
  const n=document.querySelectorAll('.slide').length;
  const el2=document.getElementById('slides-count');if(el2)el2.textContent=n+' 張';
}

function initDefault(){
  // clear existing manual slides only
  document.querySelectorAll('.slide-outer').forEach(o=>o.remove());
  slideIds2=[];slideCount2=0;
  addSlide('cover');
  addSlide('content');
  addSlide('content');
  addSlide('content');
  addSlide('cta');
}

  const prompt = `你是 AS娛樂 的 Reels 貼文文案寫手。

結尾 Slogan（每則必加，放最後一行）：不要讓未來的你，討厭現在的自己

18-30 歲女生，缺錢想賺錢，怕進八大行業被騙

${topic}

      })
