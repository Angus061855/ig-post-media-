<body>
<div id="mode-bar">
  <button class="mode-btn on" id="mbtn-ai" onclick="setMode('ai')">✦ AI 生成模式</button>
  <button class="mode-btn off" id="mbtn-manual" onclick="setMode('manual')">✎ 手動填寫模式</button>
  <span id="mode-note">AI 模式：輸入主題自動產生內容｜手動模式：不需要 API，直接填字</span>
</div>
<div id="ai-panel">
  <h1 style="font-size:15px;letter-spacing:.22em;color:var(--g);white-space:nowrap">AI 產生</h1>
  <input id="groq-key" type="password" placeholder="貼上 Groq API Key (gsk_...)" style="background:#111;border:1px solid #2e2e2e;color:#e0d8c8;font-family:inherit;font-size:11px;letter-spacing:.05em;padding:6px 10px;outline:none;width:220px;flex-shrink:0;border-radius:2px" oninput="saveKey(this.value)"/>
  <input id="ai" type="text" placeholder="@帳號" value="@angus061855" style="background:#111;border:1px solid #282828;color:#e0d8c8;font-family:inherit;font-size:12px;letter-spacing:.07em;padding:6px 10px;outline:none;width:148px;flex-shrink:0;border-radius:2px"/>
  <textarea id="it" placeholder="輸入主題或貼上文章…" style="flex:1;background:#111;border:1px solid #282828;color:#e0d8c8;font-family:inherit;font-size:12px;letter-spacing:.06em;padding:6px 10px;outline:none;height:40px;resize:none;line-height:1.6;min-width:160px;border-radius:2px"></textarea>
  <select id="cfg-mode" style="background:#111;border:1px solid #2a2a2a;color:#e0d8c8;font-family:inherit;font-size:11px;padding:5px 8px;outline:none;border-radius:2px;cursor:pointer;flex-shrink:0">
    <option value="safe">safe 保守</option><option value="balance" selected>balance 主力</option><option value="aggressive">aggressive 打臉</option>
  </select>
  <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
    <span style="font-size:10px;color:rgba(200,175,120,.4)">衝突</span>
    <input type="range" id="cfg-int" min="0" max="1" step="0.1" value="0.7" style="width:60px;accent-color:var(--g);height:3px;cursor:pointer"/>
    <span id="v-int" style="font-size:10px;color:rgba(200,175,120,.5);min-width:18px">0.7</span>
  </div>
  <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
    <span style="font-size:10px;color:rgba(200,175,120,.4)">揭露</span>
    <input type="range" id="cfg-rev" min="0" max="1" step="0.1" value="0.5" style="width:60px;accent-color:var(--g);height:3px;cursor:pointer"/>
    <span id="v-rev" style="font-size:10px;color:rgba(200,175,120,.5);min-width:18px">0.5</span>
  </div>
  <button class="tb" id="gb" onclick="doGen()" style="background:var(--g);color:#0a0a0a;border:none">✦ 產生</button>
  <button class="tb" id="rgb" style="display:none;background:transparent;color:rgba(200,175,120,.5);border:1px solid #333;font-size:11px" onclick="reGen()">↻ 換個版本</button>
  <span id="st" style="font-size:11px;letter-spacing:.1em;color:rgba(200,175,120,.4);white-space:nowrap"></span>
</div>
<div id="manual-panel" class="hidden">

</div>
