<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
<title>IG 圖文產生器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--g:rgba(200,175,120,1);--gd:rgba(200,175,120,.6);--cr:#fff;--red:#e8392b;--grey:rgba(210,205,195,.85)}
body{background:#0d0d0d;font-family:'Noto Serif TC','STSong',serif;display:flex;flex-direction:column;align-items:center;padding:28px 20px 120px;min-height:100vh}
.tb{font-family:inherit;font-size:12px;letter-spacing:.15em;padding:7px 13px;cursor:pointer;white-space:nowrap;flex-shrink:0;border-radius:2px;transition:opacity .2s}
#gb{background:var(--g);color:#0a0a0a;border:none}
#gb:hover{opacity:.85}#gb:disabled{opacity:.35;cursor:not-allowed}
#db{background:var(--g);color:#0a0a0a;border:none;display:none}
#st{font-size:11px;letter-spacing:.1em;color:rgba(200,175,120,.4);white-space:nowrap}
.slide-tc{background:#1a1a1a;border:1px solid #2e2e2e;padding:3px 8px;cursor:pointer;border-radius:2px;font-family:inherit;font-size:10px;letter-spacing:.12em;color:rgba(200,175,120,.45);transition:border-color .12s,color .12s;white-space:nowrap}
.slide-tc:hover{border-color:var(--gd);color:var(--g)}.slide-tc.on{border-color:var(--g);color:var(--g);background:#222}
.slide-theme-label{font-size:10px;letter-spacing:.12em;color:rgba(200,175,120,.3);padding:0 4px}
.slide-controls{position:absolute;top:-38px;right:0;display:flex;gap:4px;align-items:center}
#ftb{position:fixed;z-index:9999;display:none;background:#1d1d1d;border:1px solid #363636;box-shadow:0 8px 36px rgba(0,0,0,.85);padding:4px 7px;gap:1px;align-items:center;flex-wrap:wrap;max-width:760px;border-radius:4px;pointer-events:auto}
#ftb.on{display:flex}
.sp{width:1px;height:19px;background:#2e2e2e;flex-shrink:0;margin:0 2px}
.fn{background:transparent;border:1px solid transparent;color:rgba(200,175,120,.52);font-family:inherit;font-size:11px;padding:3px 6px;cursor:pointer;border-radius:3px;white-space:nowrap;transition:all .1s;display:flex;align-items:center;line-height:1.4}
.fn:hover,.fn.on{background:#272727;border-color:#4a4a4a;color:var(--g)}
.fn.x{color:rgba(255,85,85,.5)}.fn.x:hover{background:rgba(255,40,40,.07);border-color:rgba(255,70,70,.3);color:#ff5555}
.fl{font-size:9px;letter-spacing:.1em;color:rgba(200,175,120,.28);padding:0 2px;white-space:nowrap}
.fst{display:flex;align-items:center;gap:1px}
.fst button{background:#0e0e0e;border:1px solid #272727;color:rgba(200,175,120,.42);width:17px;height:19px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;border-radius:2px;transition:background .1s;flex-shrink:0}
.fst button:hover{background:#272727;color:var(--g)}.fst span{min-width:28px;text-align:center;font-size:11px;color:rgba(200,175,120,.68);letter-spacing:.03em}
.fco{width:20px;height:20px;border:1px solid #3e3e3e;cursor:pointer;border-radius:2px;padding:2px;background:#0e0e0e;flex-shrink:0}
.fsl{display:flex;align-items:center;gap:3px}.fsl input[type=range]{width:65px;accent-color:var(--g);height:3px;cursor:pointer}.fsl span{font-size:9px;color:rgba(200,175,120,.38);min-width:24px}
#gtx,#gdc,#gbg{display:none;align-items:center;gap:1px;flex-wrap:wrap}
#gtx.on,#gdc.on,#gbg.on{display:flex}
#wrap{display:flex;flex-direction:column;align-items:center;gap:52px;width:100%}
.slide{position:relative;width:1080px;height:1350px;overflow:visible;background:#0a0a0a;flex-shrink:0}
.si{position:absolute;inset:0;overflow:hidden;width:1080px;height:1350px}
.bg-el{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;cursor:pointer}
.ov-el{position:absolute;inset:0;pointer-events:none}
.deco{cursor:pointer;transition:outline .1s}.deco:hover{outline:2px dashed rgba(200,175,120,.28);outline-offset:3px}.deco.sel{outline:2px dashed rgba(200,175,120,.82)!important;outline-offset:3px}
.ed{cursor:text;border-radius:2px;outline:2px solid transparent;outline-offset:3px;transition:outline .1s}.ed:hover{outline:2px solid rgba(200,175,120,.2)}.ed.sel{outline:2px solid rgba(200,175,120,.78)!important}
.ph{display:flex;align-items:center;justify-content:center;width:1080px;height:220px;background:#141414;border:1px dashed #242424;color:rgba(200,175,120,.16);font-size:14px;letter-spacing:.25em}
/* T1 */
.t1{background:#0a0a0a}
.t1 .cw{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:110px 100px}
.t1 .tt{font-weight:900;word-break:keep-all;overflow-wrap:anywhere;font-size:96px;line-height:1.05;letter-spacing:.12em;color:var(--cr);text-shadow:0 4px 40px rgba(0,0,0,.7);display:block}
.t1 .tt.ac{color:var(--red)}
.t1 .sp2{width:100px;height:2px;margin:24px 0;background:linear-gradient(90deg,rgba(200,175,120,.6),transparent)}
.t1 .nw{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:110px 100px 110px 136px}
.t1 .nm{font-size:26px;letter-spacing:.3em;color:var(--gd);margin-bottom:56px}
.t1 .tg{display:inline-block;font-size:30px;letter-spacing:.3em;color:var(--g);border:1px solid rgba(200,175,120,.26);padding:5px 16px;margin-bottom:44px}
.t1 .hd{font-weight:900;word-break:keep-all;overflow-wrap:anywhere;font-size:56px;letter-spacing:.14em;color:#fff;line-height:1.18;margin-bottom:40px;text-shadow:0 3px 30px rgba(0,0,0,.6)}
.t1 .dv{width:64px;height:1px;margin-bottom:36px;background:rgba(200,175,120,.55)}
.t1 .pl{list-style:none;display:flex;flex-direction:column;gap:40px}
.t1 .pi{display:flex;align-items:flex-start;gap:22px}
.t1 .pn{font-size:28px;letter-spacing:.2em;color:var(--gd);padding-top:6px;flex-shrink:0;width:20px}
.t1 .ph2{font-weight:900;font-size:52px;letter-spacing:.11em;color:#fff;line-height:1.4}
.t1 .pd{font-size:36px;letter-spacing:.06em;color:var(--grey);line-height:1.6;margin-top:12px}
.t1 .ctw{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:96px}
.t1 .cd{font-size:30px;letter-spacing:.5em;color:var(--gd);margin-bottom:36px}
.t1 .cm{font-weight:900;font-size:112px;letter-spacing:.18em;color:var(--cr);line-height:1.25;text-shadow:0 4px 40px rgba(0,0,0,.7);margin-bottom:28px}
.t1 .cs{font-size:48px;letter-spacing:.22em;color:var(--grey);line-height:1.9;margin-bottom:48px;max-width:620px}
.t1 .cv{width:1px;height:56px;background:linear-gradient(to bottom,rgba(200,175,120,.55),transparent);margin:0 auto 36px}
.t1 .cb{border:1px solid rgba(200,175,120,.3);padding:16px 40px;margin-bottom:32px}
.t1 .cf{font-size:38px;letter-spacing:.32em;color:var(--g)}
.t1 .ca{font-size:30px;letter-spacing:.2em;color:var(--gd)}
/* FIX 1: logo 右上角固定 */
.slide-logo{position:absolute;top:36px;right:44px;width:64px;height:64px;object-fit:contain;z-index:10;pointer-events:none;opacity:.95}
.slide-hashtag{position:absolute;top:44px;left:52px;font-family:inherit;font-size:16px;letter-spacing:.18em;color:rgba(200,175,120,.75);z-index:10;pointer-events:none}
/* FIX 3: 浮水印縮小 */
.slide-watermark{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);font-family:inherit;font-size:13px;letter-spacing:.15em;color:rgba(200,175,120,.25);z-index:10;pointer-events:none;white-space:nowrap}
/* FIX 6: 右下角頁碼 */
.slide-footer{position:absolute;bottom:28px;right:52px;font-family:inherit;font-size:13px;letter-spacing:.15em;color:rgba(200,175,120,.32);z-index:10;pointer-events:none;white-space:nowrap}
/* layout variants */
.lv2 .cw{align-items:center;text-align:center}.lv2 .sp2{margin-left:auto;margin-right:auto}
.lv3 .cw{align-items:flex-end;text-align:right}.lv3 .sp2{margin-left:auto}
.lv4 .cw{justify-content:flex-start;padding-top:140px}
.lv6 .pl{gap:44px}.lv6 .ph2{font-size:44px!important}.lv6 .pd{font-size:34px!important}
.lv7 .hd{font-size:130px!important;line-height:1.0}
.lv8 .dv{display:none}.lv8 .nm{opacity:0}.lv8 .nw{justify-content:flex-end;padding-bottom:140px}
/* manual */
.slide-outer{display:flex;flex-direction:column;align-items:flex-start;gap:0}
.slide-bar{display:flex;align-items:center;gap:5px;padding:5px 0;width:1080px;flex-wrap:wrap}
.slide-bar .slbl{font-size:10px;letter-spacing:.18em;color:rgba(200,175,120,.3)}
.del-slide{background:transparent;border:1px solid rgba(255,60,60,.2);color:rgba(255,80,80,.4);font-family:inherit;font-size:9px;letter-spacing:.1em;padding:3px 7px;cursor:pointer;border-radius:2px;transition:all .12s;margin-left:auto}
.del-slide:hover{border-color:rgba(255,60,60,.5);color:#ff5555;background:rgba(255,40,40,.06)}
#mode-bar{width:100%;max-width:1220px;display:flex;align-items:center;gap:8px;margin-bottom:16px}
.mode-btn{font-family:inherit;font-size:12px;letter-spacing:.18em;padding:8px 20px;cursor:pointer;border-radius:2px;transition:all .15s}
.mode-btn.on{background:var(--g);color:#0a0a0a;border:none}.mode-btn.off{background:transparent;color:rgba(200,175,120,.5);border:1px solid #333}.mode-btn.off:hover{border-color:var(--gd);color:var(--g)}
#mode-note{font-size:10px;letter-spacing:.1em;color:rgba(200,175,120,.25)}
#ai-panel,#manual-panel{width:100%;max-width:1220px;background:#161616;border:1px solid #222;border-radius:3px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#ai-panel.hidden,#manual-panel.hidden{display:none}
</style>
</head>
<body>
<div id="mode-bar">
  <button class="mode-btn on" id="mbtn-ai" onclick="setMode('ai')">✦ AI 生成模式</button>
  <button class="mode-btn off" id="mbtn-manual" onclick="setMode('manual')">✎ 手動填寫模式</button>
  <span id="mode-note">AI 模式：輸入主題自動產生｜手動模式：直接填字</span>
</div>
<div id="ai-panel">
  <h1 style="font-size:15px;letter-spacing:.22em;color:var(--g);white-space:nowrap">AI 產生</h1>
  <input id="groq-key" type="password" placeholder="Groq API Key (gsk_...)" style="background:#111;border:1px solid #2e2e2e;color:#e0d8c8;font-family:inherit;font-size:11px;padding:6px 10px;outline:none;width:220px;flex-shrink:0;border-radius:2px" oninput="saveKey(this.value)"/>
  <input id="ai" type="text" placeholder="@帳號" value="@angus061855" style="background:#111;border:1px solid #282828;color:#e0d8c8;font-family:inherit;font-size:12px;padding:6px 10px;outline:none;width:148px;flex-shrink:0;border-radius:2px"/>
  <textarea id="it" placeholder="輸入主題或貼上文章…" style="flex:1;background:#111;border:1px solid #282828;color:#e0d8c8;font-family:inherit;font-size:12px;padding:6px 10px;outline:none;height:40px;resize:none;line-height:1.6;min-width:160px;border-radius:2px"></textarea>
  <button class="tb" id="gb" onclick="doGen()">✦ 產生</button>
  <button class="tb" id="rgb" style="display:none;background:transparent;color:rgba(200,175,120,.5);border:1px solid #333;font-size:11px" onclick="reGen()">↻ 換個版本</button>
  <span id="st"></span>
</div>
<div id="manual-panel" class="hidden">
  <h1 style="font-size:15px;letter-spacing:.22em;color:var(--g);white-space:nowrap">手動編輯</h1>
  <button class="tb" onclick="addSlide()" style="background:transparent;color:rgba(200,175,120,.5);border:1px solid #333;font-size:11px">＋ 新增頁面</button>
  <button class="tb" onclick="initDefault()" style="background:transparent;color:rgba(200,175,120,.4);border:1px solid #2a2a2a;font-size:11px">↺ 重設5張空白</button>
  <span id="slides-count" style="font-size:11px;letter-spacing:.1em;color:rgba(200,175,120,.35)">5 張</span>
</div>
<div style="width:100%;max-width:1220px;display:flex;align-items:center;gap:8px;margin-bottom:8px">
  <button class="tb" onclick="document.getElementById('bgf').click()" style="background:transparent;color:rgba(200,175,120,.4);border:1px solid #2a2a2a;font-size:11px">⊕ 換背景</button>
  <input type="file" id="bgf" accept="image/*" onchange="uploadBg(event)" style="display:none"/>
  <button class="tb" id="db" onclick="dlAll()">↓ 下載全部 (ZIP)</button>
</div>
<div id="ftb">
  <span id="gtx">
    <button class="fn" id="bb2" onclick="fmt('b')"><b>B</b></button>
    <button class="fn" id="bs2" onclick="fmt('s')"><s>S</s></button>
    <div class="sp"></div><span class="fl">選取色</span><input type="color" class="fco" id="fcs" value="#c8af78" oninput="fmt('c',this.value)"/>
    <div class="sp"></div><span class="fl">字級</span>
    <div class="fst"><button onclick="adj('fs',-2)">−</button><span id="vfs">28px</span><button onclick="adj('fs',2)">＋</button></div>
    <div class="sp"></div><span class="fl">字距</span>
    <div class="fst"><button onclick="adj('ls',-1)">−</button><span id="vls">0px</span><button onclick="adj('ls',1)">＋</button></div>
    <div class="sp"></div><span class="fl">行高</span>
    <div class="fst"><button onclick="adj('lh',-.1)">−</button><span id="vlh">1.5</span><button onclick="adj('lh',.1)">＋</button></div>
    <div class="sp"></div><span class="fl">全色</span><input type="color" class="fco" id="fca" oninput="adj('col',this.value)"/>
    <div class="sp"></div><span class="fl">透明</span>
    <div class="fsl"><input type="range" id="fop" min="0" max="100" value="100" oninput="adj('op',this.value)"/><span id="vop">100%</span></div>
    <div class="sp"></div><button class="fn x" onclick="delEl()">✕</button>
  </span>
  <span id="gdc">
    <span class="fl" id="dlbl">線條</span><div class="sp"></div>
    <span class="fl">顏色</span><input type="color" class="fco" id="fdc" value="#c8af78" oninput="da('col',this.value)"/>
    <div class="sp"></div><span class="fl">透明</span>
    <div class="fsl"><input type="range" id="fdo" min="0" max="100" value="100" oninput="da('op',this.value)"/><span id="vdo">100%</span></div>
    <div class="sp"></div><span class="fl">粗細</span>
    <div class="fst"><button onclick="da('sz',-1)">−</button><span id="vdsz">1</span><button onclick="da('sz',1)">＋</button></div>
    <div class="sp"></div><button class="fn x" onclick="delEl()">✕</button>
  </span>
  <span id="gbg">
    <span class="fl">背景</span>
    <div class="fsl"><input type="range" id="fbg" min="0" max="100" value="82" oninput="ba('bg',this.value)"/><span id="vbg">82%</span></div>
    <div class="sp"></div><span class="fl">遮罩</span>
    <div class="fsl"><input type="range" id="fov" min="0" max="100" value="100" oninput="ba('ov',this.value)"/><span id="vov">100%</span></div>
  </span>
</div>
<div id="wrap"><div class="ph">輸入內容後按「✦ 產生」</div></div>
<script>
const THEMES=[{id:'t1',name:'帝王'}];
let SEL=null,SMODE='txt',savedSel=null;
let BGU='url("back.png")';
let lastInput='',lastAccount='';
let currentData=null;
let globalTheme='t1';
let slideThemes={};
let totalSlides=0;
const E=id=>document.getElementById(id);
const SS=(id,v)=>E(id).textContent=v;
const SG=(id,v)=>{E(id).value=v};
const stat=m=>E('st').textContent=m;

/* FIX 2: 頁面載入時把 back.png 轉 base64，確保背景顯示 */
window.addEventListener('load',function(){
  var img=new Image();
  img.crossOrigin='anonymous';
  img.onload=function(){
    try{
      var c=document.createElement('canvas');
      c.width=img.naturalWidth||1920;c.height=img.naturalHeight||1080;
      c.getContext('2d').drawImage(img,0,0);
      BGU='url("'+c.toDataURL()+'")';
      document.querySelectorAll('.bg-el').forEach(function(b){b.style.backgroundImage=BGU;});
    }catch(e){}
  };
  img.src='back.png?t='+Date.now();
});

function uploadBg(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){BGU='url("'+ev.target.result+'")';document.querySelectorAll('.bg-el').forEach(function(b){b.style.backgroundImage=BGU;});stat('✓ 背景已更新');};
  r.readAsDataURL(f);e.target.value='';
}
function posTB(e){
  var tb=E('ftb');var r=e.getBoundingClientRect();
  var top=r.top-42+window.scrollY;
  if(top<52)top=r.bottom+6+window.scrollY;
  tb.style.top=Math.max(6,top)+'px';
  tb.style.left=Math.max(6,Math.min(r.left+window.scrollX,window.innerWidth-780))+'px';
  tb.classList.add('on');
}
function hideTB(){E('ftb').classList.remove('on')}
function repTB(){if(SEL)posTB(SEL)}
function showTB(e,mode){
  SEL=e;SMODE=mode;
  E('gtx').className='gtx'+(mode==='txt'?' on':'');
  E('gdc').className='gdc'+(mode==='deco'?' on':'');
  E('gbg').className='gbg'+(mode==='bg'?' on':'');
  posTB(e);
  if(mode==='txt')syncTxt(e);
  else if(mode==='deco')syncDeco(e);
  else if(mode==='bg')syncBg(e);
}
function syncTxt(e){
  var cs=getComputedStyle(e);
  var fs=parseFloat(cs.fontSize)||28;
  var ls=parseFloat(cs.letterSpacing)||0;
  var lh=parseFloat(cs.lineHeight)||(fs*1.5);
  SS('vfs',Math.round(fs)+'px');SS('vls',Math.round(ls)+'px');
  SS('vlh',(Math.round(lh/fs*10)/10).toFixed(1));
  var rgb=cs.color.match(/[\d.]+/g);
  if(rgb&&rgb.length>=3)SG('fca','#'+[rgb[0],rgb[1],rgb[2]].map(function(v){return parseInt(v).toString(16).padStart(2,'0');}).join(''));
  var op=Math.round((parseFloat(e.style.opacity)||1)*100);
  SG('fop',op);SS('vop',op+'%');
  E('bb2').classList.toggle('on',cs.fontWeight==='700');
  E('bs2').classList.toggle('on',cs.textDecoration.includes('line-through'));
}
function dType(e){
  var c=(e.className||'').toString();
  if(c.includes('sp2'))return 'sp2';
  if(c.includes('dv'))return 'dv';
  if(c.includes('cv'))return 'cv';
  if(c.includes('nm'))return 'num';
  if(c.includes('cd'))return 'dots';
  if(c.includes('pn'))return 'pnum';
  if(c.includes('cb'))return 'cbox';
  return 'other';
}
function syncDeco(e){
  var t=dType(e);
  var cs=getComputedStyle(e);
  var op=Math.round((parseFloat(e.style.opacity)||1)*100);
  SG('fdo',op);SS('vdo',op+'%');
}
function syncBg(e){
  var si=e.closest('.si');
  var bg=si&&si.querySelector('.bg-el'),ov=si&&si.querySelector('.ov-el');
  if(bg){var v=Math.round((parseFloat(bg.style.opacity)||.82)*100);SG('fbg',v);SS('vbg',v+'%')}
  if(ov){var v2=Math.round((parseFloat(ov.style.opacity)||1)*100);SG('fov',v2);SS('vov',v2+'%')}
}
function saveSel(){var s=window.getSelection();if(s&&s.rangeCount>0&&!s.isCollapsed){savedSel=s.getRangeAt(0).cloneRange();return true}return false}
function restSel(){if(!savedSel)return false;var s=window.getSelection();s.removeAllRanges();s.addRange(savedSel);return true}
E('ftb').addEventListener('mousedown',function(){saveSel();});
function fmt(cmd,val){
  restSel();
  var sel=window.getSelection();
  var has=sel&&!sel.isCollapsed&&SEL&&SEL.contains(sel.anchorNode);
  if(cmd==='b'){
    if(has)document.execCommand('bold',false,null);
    else if(SEL){var w=getComputedStyle(SEL).fontWeight;SEL.style.fontWeight=(w==='700'||w==='bold')?'normal':'bold';}
    E('bb2').classList.toggle('on',getComputedStyle(SEL||document.body).fontWeight==='700');
  }else if(cmd==='s'){
    if(has)document.execCommand('strikeThrough',false,null);
    else if(SEL){var d=getComputedStyle(SEL).textDecoration;SEL.style.textDecoration=d.includes('line-through')?'none':'line-through';}
    E('bs2').classList.toggle('on',getComputedStyle(SEL||document.body).textDecoration.includes('line-through'));
  }else if(cmd==='c'&&has){document.execCommand('foreColor',false,val);}
}
function adj(prop,val){
  if(!SEL)return;var cs=getComputedStyle(SEL);
  if(prop==='fs'){var v=Math.max(8,parseFloat(cs.fontSize)+val);SEL.style.fontSize=v+'px';SS('vfs',Math.round(v)+'px');repTB()}
  else if(prop==='ls'){var v2=parseFloat(cs.letterSpacing)+val;SEL.style.letterSpacing=v2+'px';SS('vls',Math.round(v2)+'px')}
