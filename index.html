<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
<title>IG 圖文產生器 · 高質感版</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --gold-pure:rgba(200,175,120,1);
  --gold-med:rgba(200,175,120,0.82);
  --gold-light:rgba(200,175,120,0.6);
  --gold-pale:rgba(200,175,120,0.35);
  --text-h1:#ffffff;
  --text-h2:rgba(220,215,200,1);
  --text-body:rgba(210,205,195,0.88);
  --accent-red:#e8392b;
}

*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;font-family:'Noto Serif TC',serif;display:flex;flex-direction:column;align-items:center;padding:28px 20px 120px;min-height:100vh}

#topbar{width:100%;max-width:1220px;display:flex;align-items:center;gap:8px;background:#181818;border:1px solid #252525;padding:11px 16px;margin-bottom:22px;flex-wrap:wrap;border-radius:3px}
#topbar h1{font-size:15px;letter-spacing:.22em;color:var(--gold-pure);white-space:nowrap;font-weight:700}
#ai,#it{background:#111;border:1px solid #282828;color:#e0d8c8;font-family:inherit;font-size:12px;padding:6px 10px;outline:none;border-radius:2px}
#it{flex:1;height:40px;resize:none;min-width:160px}
.tb{font-family:inherit;font-size:12px;letter-spacing:.15em;padding:7px 13px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s;border-radius:2px}
#gb{background:var(--gold-pure);color:#0a0a0a;border:none;font-weight:700}
#gb:hover{opacity:.85}#gb:disabled{opacity:.35;cursor:not-allowed}

#design-ref{position:fixed;top:12px;right:12px;z-index:10000;width:360px;max-height:85vh;overflow-y:auto;background:#1a1a1a;border:1px solid #333;border-radius:4px;padding:16px;display:none;font-size:12px;color:rgba(200,175,120,.6)}
#design-ref::-webkit-scrollbar{width:6px}
#design-ref::-webkit-scrollbar-track{background:#111}
#design-ref::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
#design-ref::-webkit-scrollbar-thumb:hover{background:#444}

#wrap{display:flex;flex-direction:column;align-items:center;gap:52px;width:100%}
.slide{position:relative;width:1080px;height:1350px;overflow:visible;background:#0a0a0a;flex-shrink:0}
.si{position:absolute;inset:0;overflow:hidden;width:1080px;height:1350px}
.bg-el{position:absolute;inset:0;background-size:cover;background-position:center}
.ov-el{position:absolute;inset:0;pointer-events:none}
.deco{cursor:pointer;transition:outline .1s}
.deco:hover{outline:2px dashed rgba(200,175,120,.28);outline-offset:3px}
.ed{cursor:text;border-radius:2px;outline:2px solid transparent;outline-offset:3px;transition:outline .1s}
.ed:hover{outline:2px solid rgba(200,175,120,.2)}

/* T1 IMPERIAL */
.t1{background:#0a0a0a}
.t1 .corner{position:absolute;width:40px;height:40px;border-color:rgba(200,175,120,.18);border-style:solid}
.t1 .tl{top:56px;left:56px;border-width:2px 0 0 2px}.t1 .tr{top:56px;right:56px;border-width:2px 2px 0 0}
.t1 .bl{bottom:56px;left:56px;border-width:0 0 2px 2px}.t1 .br{bottom:56px;right:56px;border-width:0 2px 2px 0}
.t1 .cw{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:110px 100px}
.t1 .nw{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:110px 100px 110px 136px}
.t1 .ctw{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:96px}

.t1 .ey{font-size:28px;letter-spacing:.35em;color:var(--gold-light);margin-bottom:28px;font-weight:600;text-transform:uppercase;opacity:0.85}
.t1 .tt{font-weight:900;font-size:108px;line-height:1.05;letter-spacing:.12em;color:var(--text-h1);text-shadow:0 4px 40px rgba(0,0,0,.7);margin-bottom:8px;word-break:keep-all;overflow-wrap:anywhere}
.t1 .tt.ac{color:var(--accent-red)!important}
.t1 .sp2{width:100px;height:2px;margin:24px 0;background:linear-gradient(90deg,var(--gold-med),transparent)}
.t1 .sb{font-size:28px;letter-spacing:.15em;color:var(--text-body);line-height:1.8;margin-bottom:32px;font-weight:500}
.t1 .ac2{font-size:22px;letter-spacing:.18em;color:var(--gold-light);border-top:1px solid rgba(200,175,120,.15);padding-top:14px;font-weight:600}

.t1 .nm{font-size:28px;letter-spacing:.28em;color:var(--gold-light);margin-bottom:32px;font-weight:600;text-transform:uppercase}
.t1 .tg{display:inline-block;font-size:32px;letter-spacing:.28em;color:var(--gold-pure);border:1px solid rgba(200,175,120,.4);padding:6px 16px;margin-bottom:28px;background:rgba(200,175,120,.06);font-weight:700}
.t1 .hd{font-weight:900;font-size:80px;letter-spacing:.12em;color:var(--text-h1);line-height:1.18;margin-bottom:40px;text-shadow:0 2px 12px rgba(200,175,120,.2),0 4px 24px rgba(0,0,0,.7);word-break:keep-all;overflow-wrap:anywhere}
.t1 .dv{width:64px;height:2px;margin-bottom:40px;background:linear-gradient(90deg,var(--gold-med),transparent)}
.t1 .pl{list-style:none;display:flex;flex-direction:column;gap:40px}
.t1 .pi{display:flex;align-items:flex-start;gap:44px}
.t1 .pn{font-size:32px;letter-spacing:.12em;color:var(--gold-pure);padding-top:6px;flex-shrink:0;width:44px;font-weight:900;text-shadow:0 0 16px rgba(200,175,120,.4)}
.t1 .ph2{font-weight:900;font-size:50px;letter-spacing:.08em;color:var(--text-h2);line-height:1.4;text-shadow:0 2px 12px rgba(0,0,0,.6)}
.t1 .ph2::after{content:'';display:block;width:32px;height:2px;background:var(--gold-med);margin-top:8px}
.t1 .pd{font-size:32px;letter-spacing:.08em;color:var(--text-body);line-height:1.7;margin-top:8px;font-weight:500}

.t1 .cd{font-size:28px;letter-spacing:.5em;color:var(--gold-light);margin-bottom:32px;font-weight:600}
.t1 .cm{font-weight:900;font-size:96px;letter-spacing:.1em;color:var(--text-h1);line-height:1.2;text-shadow:0 4px 40px rgba(0,0,0,.7);margin-bottom:24px;word-break:keep-all;overflow-wrap:anywhere}
.t1 .cs{font-size:38px;letter-spacing:.1em;color:var(--text-body);line-height:1.8;margin-bottom:44px;max-width:780px;word-break:keep-all;overflow-wrap:anywhere;font-weight:500}
.t1 .cv{width:1px;height:56px;background:linear-gradient(to bottom,var(--gold-med),transparent);margin:0 auto 32px}
.t1 .cb{border:1px solid rgba(200,175,120,.3);padding:16px 48px;margin-bottom:28px;max-width:840px;word-break:keep-all}
.t1 .cf{font-size:32px;letter-spacing:.12em;color:var(--gold-pure);word-break:keep-all;overflow-wrap:anywhere;font-weight:700}
.t1 .ca{font-size:28px;letter-spacing:.18em;color:var(--gold-light);font-weight:600}

.t1 .nw::before,.t1 .cw::before,.t1 .ctw::before{content:attr(data-idx);position:absolute;font-size:480px;font-weight:900;color:rgba(200,175,120,.05);right:-40px;bottom:-100px;line-height:1;pointer-events:none}

.lv1 .cw{justify-content:center;padding:100px 100px}
.slide-hashtag{position:absolute;top:44px;left:52px;font-size:16px;letter-spacing:.18em;color:var(--gold-light);z-index:10;pointer-events:none;font-weight:600}
.slide-watermark{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);font-size:16px;letter-spacing:.26em;color:var(--gold-pale);z-index:10;pointer-events:none;white-space:nowrap;font-weight:600}

#st{font-size:11px;letter-spacing:.1em;color:var(--gold-pale);white-space:nowrap}
.ph{display:flex;align-items:center;justify-content:center;width:1080px;height:220px;background:#141414;border:1px dashed #242424;color:var(--gold-pale);font-size:14px;letter-spacing:.25em}

</style>
</head>
<body>

<!-- 設計參考面板 -->
<div id="design-ref">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <span style="font-size:13px;font-weight:700;color:var(--gold-pure);letter-spacing:.2em">🎨 色彩系統</span>
    <button onclick="document.getElementById('design-ref').style.display='none'" style="background:none;border:none;color:rgba(200,175,120,.4);cursor:pointer;font-size:16px;line-height:1">✕</button>
  </div>
  
  <div style="background:#111;border:1px solid #252525;border-radius:3px;padding:12px;margin-bottom:12px">
    <div style="color:var(--gold-pure);font-weight:700;margin-bottom:10px;letter-spacing:.1em;font-size:11px">🟡 金色五層</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:10px">
      <div style="background:rgba(200,175,120,1);color:#0a0a0a;padding:6px;border-radius:2px;text-align:center;font-weight:700">純金<br>序號</div>
      <div style="background:rgba(200,175,120,0.82);color:#fff;padding:6px;border-radius:2px;text-align:center;font-weight:600">中金<br>線條</div>
      <div style="background:rgba(200,175,120,0.6);color:#fff;padding:6px;border-radius:2px;text-align:center;font-weight:600">淡金<br>眉標</div>
      <div style="background:rgba(200,175,120,0.35);color:#fff;padding:6px;border-radius:2px;text-align:center;font-weight:600">極淡<br>標籤</div>
    </div>
  </div>
  
  <div style="background:#111;border:1px solid #252525;border-radius:3px;padding:12px;margin-bottom:12px">
    <div style="color:var(--gold-pure);font-weight:700;margin-bottom:8px;letter-spacing:.1em;font-size:11px">⚪ 文字色階</div>
    <div style="display:flex;flex-direction:column;gap:6px;font-size:9px;line-height:1.4">
      <div style="display:flex;align-items:center;gap:6px"><div style="width:30px;height:18px;background:#ffffff;border-radius:2px"></div><span>H1: 108px 大標</span></div>
      <div style="display:flex;align-items:center;gap:6px"><div style="width:30px;height:18px;background:rgba(220,215,200,1);border-radius:2px"></div><span>H2: 56-80px 副標</span></div>
      <div style="display:flex;align-items:center;gap:6px"><div style="width:30px;height:18px;background:rgba(210,205,195,0.88);border-radius:2px"></div><span>Body: 28-36px 正文</span></div>
      <div style="display:flex;align-items:center;gap:6px"><div style="width:30px;height:18px;background:rgba(200,190,170,0.72);border-radius:2px"></div><span>Meta: 18-24px 說明</span></div>
    </div>
  </div>
  
  <div style="background:#111;border:1px solid #252525;border-radius:3px;padding:12px">
    <div style="color:var(--gold-pure);font-weight:700;margin-bottom:8px;letter-spacing:.1em;font-size:11px">📐 設計檢核</div>
    <ul style="margin:0;padding-left:14px;font-size:10px;line-height:1.8;color:rgba(200,175,120,.5)">
      <li>🔴 紅色只在第二行？</li>
      <li>⚪ 大標用純白嗎？</li>
      <li>🟡 序號用純金色？</li>
      <li>📦 標籤有邊框？</li>
      <li>〰️ 分隔線漸淡？</li>
      <li>💬 字級遞進？</li>
    </ul>
  </div>
</div>

<div id="topbar">
  <h1>✦ IG 輪播 · 高質感版</h1>
  <input id="ai" type="text" placeholder="@帳號" value="@angus061855" style="width:148px"/>
  <textarea id="it" placeholder="輸入主題或貼上文章…"></textarea>
  <button class="tb" id="gb" onclick="doGen()">✦ 產生</button>
  <button class="tb" id="rgb" style="display:none;color:rgba(200,175,120,.5);border:1px solid #333;font-size:11px" onclick="reGen()">↻ 換版本</button>
  <button class="tb" style="color:rgba(200,175,120,.5);border:1px solid #333;font-size:11px;margin-left:auto" onclick="toggleDesignRef()" title="切換設計參考面板">🎨 參考</button>
  <span id="st"></span>
</div>

<div id="wrap"><div class="ph">輸入內容後按「✦ 產生」</div></div>

<script>
function toggleDesignRef(){
  const ref = document.getElementById('design-ref');
  ref.style.display = ref.style.display === 'none' ? 'block' : 'none';
}

let SEL=null,SMODE='txt';
let BGU='url("back.png")';
let lastInput='',lastAccount='';
let currentData=null;
let globalTheme='t1';
const E=id=>document.getElementById(id);
const stat=m=>{const el=E('st');if(el)el.textContent=m};

function getCfg(){ return { mode:'balance', intensity:0.7, revealLevel:0.5 }; }

function bgD(thm){ return`<div class="bg-el deco" style="background-image:${BGU};opacity:0.95;background-size:cover;background-position:center;image-rendering:crisp-edges"></div>`; }
function ovD(thm){ return`<div class="ov-el" style="position:absolute;inset:0;pointer-events:none;background:linear-gradient(160deg,rgba(0,0,0,.2) 0%,rgba(8,6,3,.2) 55%,rgba(0,0,0,.2) 100%)"></div>`; }

function buildPrompt(topic, cfg) {
  return `你是 IG 輪播貼文策略師。只輸出純 JSON，從 { 開始到 } 結束，不加任何說明文字。

【重要素材規則】根據我提供的核心論點和具體細節素材來生成，素材裡有的具體數字、案例、說法，必須完整保留。

【任務：生成 7 頁 IG 輪播貼文】
第1頁 cover：HOOK 鉤子，踢爆內幕或引發強烈好奇
第2頁 story：內行人視角說業界亂象，建立信任感
第3-5頁 content：給出具體方法或步驟，用對比強化
第6頁 summary：把所有重點列成清單
第7頁 cta：行動頁，導向私訊

【文字格式規則】
- cover title：必須有兩行，用 \\n 分隔，第一行白字（問題），第二行紅色強調（答案）
- 每行最多 6 個中文字，只在完整詞語結尾換行
- 範例：「別被騙了\\n保護妳自己」
- story/content/summary 的 heading：每行最多 8 個中文字

【寫作風格】語氣直接、踢爆、誠實，多用對比、反問句、打臉句。

【主題】${topic}

【輸出格式】直接輸出純 JSON，結構如下：
{ "cover": { "eyebrow": string, "title": string, "subtitle": string },
"story": { "tag": string, "heading": string, "points": [{ "title": string, "desc": string }, x3] },
"content": [ x3 個內容頁 ],
"summary": { "tag": string, "heading": string, "points": [x3] },
"cta": { "main": string, "sub": string, "follow": string } }`.trim();
}

function parseJSON(text){
  const s=text.indexOf('{'),e2=text.lastIndexOf('}');
  if(s===-1||e2===-1)return null;
  try{ return JSON.parse(text.slice(s,e2+1)); }catch(e){return null}
}

async function callAPI(inp,sys,max){
  const key = localStorage.getItem('groq_key')||'';
  if(!key){ stat('⚠ 請先填入 Groq API Key'); throw new Error('No API key'); }
  const systemPrompt = (sys && sys.trim()) ? sys : buildPrompt(inp, getCfg());
  const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({
      model:'meta-llama/llama-4-scout-17b-16e-instruct',
      max_tokens:max||5000,
      messages:[{role:'system',content:systemPrompt},{role:'user',content:inp}]
    })
  });
  const j=await r.json();
  if(j.error) throw new Error(j.error.message||'Groq error');
  return j.choices?.[0]?.message?.content||'';
}

function mkSlide(id,thm,innerHtml){
  const s=document.createElement('div');s.className='slide';s.id=id;
  const si=document.createElement('div');si.className='si '+thm+' lv1';
  const tag='<div class="slide-hashtag">#AS娛樂經紀</div>';
  const wm='<div class="slide-watermark">'+(E('ai')?.value.trim()||'@angus061855')+'</div>';
  si.innerHTML=tag+innerHtml+wm;
  s.appendChild(si);
  return s;
}

function bCover(d,account,thm){
  const parts=(d.title||'').split('\n');
  const t1=parts[0]||'';
  const t2=parts[1]||'';
  const s=mkSlide('slide-1',thm,`${bgD(thm)}${ovD(thm)}<div class="cw" data-idx="1">
    <div class="ey">${d.eyebrow||''}</div><div><span class="tt">${t1}</span>${t2?`<span class="tt ac">${t2}</span>`:''}</div>
    <div class="sp2"></div><div class="sb">${(d.subtitle||'').replace(/\n/g,'<br>')}</div><div class="ac2">${account}</div></div>`);
  return s;
}

function bContent(d,idx,total,thm){
  const num=String(idx+1).padStart(2,'0')+' / '+String(total).padStart(2,'0');
  const pts=(d.points||[]).map((p,i)=>`<li class="pi"><span class="pn">0${i+1}</span><div><div class="ph2">${p.title||''}</div><div class="pd">${p.desc||''}</div></div></li>`).join('');
  const slideId=`slide-${idx+2}`;
  const s=mkSlide(slideId,thm,`${bgD(thm)}${ovD(thm)}<div class="nw" data-idx="${idx+1}">
    <div class="nm">${num}</div>${d.tag?`<div class="tg">${d.tag}</div>`:''}<div class="hd">${(d.heading||'').replace(/\n/g,'<br>')}</div>
    <div class="dv"></div><ul class="pl">${pts}</ul></div>`);
  return s;
}

function bCta(d,account,idx,thm){
  const s=mkSlide(`slide-${idx+2}`,thm,`${bgD(thm)}${ovD(thm)}<div class="ctw" data-idx="${idx+2}">
    <div class="cd">◆ ◆ ◆</div><div class="cm">${(d.main||'').replace(/\n/g,'<br>')}</div><div class="cs">${(d.sub||'').replace(/\n/g,'<br>')}</div>
    <div class="cv"></div><div class="cb"><div class="cf">${d.follow||''}</div></div><div class="ca">${account}</div></div>`);
  return s;
}

function render(data,account,thm){
  currentData=data;
  const wrap=E('wrap');wrap.innerHTML='';
  const cnt=data.content||[];
  
  wrap.appendChild(bCover(data.cover,account,thm));
  [data.story,...cnt,data.summary].forEach((d,i)=>{
    if(d&&d.heading)wrap.appendChild(bContent(d,i,cnt.length+2,thm));
  });
  wrap.appendChild(bCta(data.cta,account,cnt.length+1,thm));
  
  E('rgb').style.display='block';
  stat('✓ 完成');
}

async function doGen(){
  const inp = E('it').value.trim();
  const account = E('ai').value.trim() || '@your.account';
  if(!inp){ stat('請輸入主題或文章'); return; }
  
  lastAccount = account;
  lastInput = inp;
  E('gb').disabled = true;
  stat('生成中…');
  
  try{
    let text = await callAPI(inp, null, 5000);
    let data = parseJSON(text);
    if(!data){ stat('⚠ 生成失敗'); return; }
    render(data, account, 't1');
  }catch(e){ stat('錯誤：' + e.message); }
  finally{ E('gb').disabled = false; }
}

async function reGen(){
  if(!lastInput){ stat('請先產生一次內容'); return; }
  E('rgb').disabled = true;
  stat('重新生成中…');
  
  try{
    let text = await callAPI(lastInput+'\n\n請用完全不同的切入角度重新規劃。', null, 5000);
    let data = parseJSON(text);
    if(!data){ stat('⚠ 重新生成失敗'); return; }
    render(data, lastAccount, 't1');
  }catch(e){ stat('錯誤：' + e.message); }
  finally{ E('rgb').disabled = false; }
}

// 存儲 API Key
function setupKeyInput(){
  const k = localStorage.getItem('groq_key')||'';
  if(!k){
    const inp = document.createElement('input');
    inp.type = 'password';
    inp.placeholder = '貼上 Groq API Key (gsk_...)';
    inp.style.cssText = 'background:#111;border:1px solid #2e2e2e;color:#e0d8c8;font-family:inherit;font-size:11px;padding:6px 10px;outline:none;width:220px;flex-shrink:0;border-radius:2px;margin-right:8px';
    inp.oninput = e => { if(e.target.value) localStorage.setItem('groq_key', e.target.value); };
    document.querySelector('#topbar').insertBefore(inp, document.querySelector('#gb'));
  }
}

window.addEventListener('load', setupKeyInput);
</script>

</body>
</html>
