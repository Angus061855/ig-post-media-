<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700;900&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<title>AS娛樂 | 大頭</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:rgba(200,175,120,1);--gold-d:rgba(200,175,120,.6);--red:#c8392b;--bg:#0a0a0a;--bg3:#181818;--border:#252525;--tw:#f5f2ec;--tm:rgba(240,235,225,.82);--ts:rgba(220,215,205,.55)}
body{background:#0d0d0d;font-family:"Noto Serif TC",serif;display:flex;flex-direction:column;align-items:center;padding:24px 20px 120px;min-height:100vh}
#app-tabs{width:100%;max-width:1220px;display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:0}
.app-tab{font-family:"Noto Serif TC",serif;font-size:12px;letter-spacing:.2em;padding:9px 24px;cursor:pointer;border:1px solid transparent;border-bottom:none;border-radius:3px 3px 0 0;color:rgba(200,175,120,.4);background:transparent;transition:all .15s;margin-bottom:-1px}
.app-tab.on{background:var(--bg3);border-color:var(--border);color:var(--gold);border-bottom-color:var(--bg3)}
.app-tab:hover:not(.on){color:var(--gold-d)}
.app-panel{display:none;width:100%;flex-direction:column;align-items:center}
.app-panel.on{display:flex}
#topbar{width:100%;max-width:1220px;display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);padding:10px 16px;margin-bottom:16px;flex-wrap:wrap;border-radius:4px}
#topbar h1{font-size:14px;letter-spacing:.3em;color:var(--gold);white-space:nowrap;font-weight:500}
.tb-inp{background:#0e0e0e;border:1px solid #2a2a2a;color:#e0d8c8;font-family:"Noto Serif TC",serif;font-size:12px;letter-spacing:.06em;padding:6px 10px;outline:none;border-radius:3px}
.tb-inp:focus{border-color:var(--gold-d)}.tb-inp::placeholder{color:rgba(200,175,120,.2)}
#groq-key{width:220px;flex-shrink:0}#ai-acct{width:148px;flex-shrink:0}
#it{flex:1;height:40px;resize:none;line-height:1.6;min-width:160px}
.tb-btn{font-family:"Noto Serif TC",serif;font-size:11px;letter-spacing:.18em;padding:7px 14px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s;border-radius:3px}
#gb{background:var(--gold);color:#0a0a0a;border:none;font-weight:700}#gb:hover{opacity:.85}#gb:disabled{opacity:.35;cursor:not-allowed}
#db{background:transparent;color:var(--gold-d);border:1px solid #383838;display:none}#db:hover{border-color:var(--gold-d);color:var(--gold)}
#rgb{display:none;background:transparent;color:rgba(200,175,120,.45);border:1px solid #2e2e2e;font-size:11px}#rgb:hover{border-color:var(--gold-d);color:var(--gold)}
#bgf{display:none}
#bg-btn{background:transparent;color:rgba(200,175,120,.4);border:1px solid #2a2a2a;font-size:11px}#bg-btn:hover{border-color:var(--gold-d);color:var(--gold)}
#st{font-size:11px;letter-spacing:.1em;color:rgba(200,175,120,.4);white-space:nowrap}
#ftb{position:fixed;z-index:9999;display:none;background:#1d1d1d;border:1px solid #363636;box-shadow:0 8px 36px rgba(0,0,0,.85);padding:4px 7px;gap:1px;align-items:center;flex-wrap:wrap;max-width:760px;border-radius:4px;pointer-events:auto}
#ftb.on{display:flex!important}
.sp{width:1px;height:19px;background:#2e2e2e;flex-shrink:0;margin:0 2px}
.fn{background:transparent;border:1px solid transparent;color:rgba(200,175,120,.52);font-family:"Noto Serif TC",serif;font-size:11px;padding:3px 6px;cursor:pointer;border-radius:3px;white-space:nowrap;transition:all .1s;display:flex;align-items:center;line-height:1.4}
.fn:hover,.fn.on{background:#272727;border-color:#4a4a4a;color:var(--gold)}
.fn.x{color:rgba(255,85,85,.5)}.fn.x:hover{background:rgba(255,40,40,.07);border-color:rgba(255,70,70,.3);color:#ff5555}
.fl{font-size:9px;letter-spacing:.1em;color:rgba(200,175,120,.28);padding:0 2px;white-space:nowrap}
.fst{display:flex;align-items:center;gap:1px}
.fst button{background:#0e0e0e;border:1px solid #272727;color:rgba(200,175,120,.42);width:17px;height:19px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;border-radius:2px;transition:background .1s;flex-shrink:0}
.fst button:hover{background:#272727;color:var(--gold)}
.fst span{min-width:28px;text-align:center;font-size:11px;color:rgba(200,175,120,.68);letter-spacing:.03em}
.fco{width:20px;height:20px;border:1px solid #3e3e3e;cursor:pointer;border-radius:2px;padding:2px;background:#0e0e0e;flex-shrink:0}
.fsl{display:flex;align-items:center;gap:3px}.fsl input[type=range]{width:65px;accent-color:var(--gold);height:3px;cursor:pointer}.fsl span{font-size:9px;color:rgba(200,175,120,.38);min-width:24px}
#gtx,#gdc,#gbg{display:none;align-items:center;gap:1px;flex-wrap:wrap}
#gtx.on,#gdc.on,#gbg.on{display:flex}
#wrap{display:flex;flex-direction:column;align-items:center;gap:48px;width:100%;margin-top:20px}
.slide-outer{display:flex;flex-direction:column;align-items:flex-start;gap:0}
.slide{position:relative;width:1080px;height:1350px;overflow:visible;flex-shrink:0}
.si{position:absolute;inset:0;overflow:hidden;width:1080px;height:1350px;background:#0a0a0a}
.slide-bar{display:flex;align-items:center;gap:6px;padding:6px 0;width:1080px;flex-wrap:wrap}
.regen-btn{background:transparent;border:1px solid #333;color:rgba(200,175,120,.45);font-family:inherit;font-size:10px;letter-spacing:.12em;padding:4px 10px;cursor:pointer;border-radius:2px;transition:all .12s}
.regen-btn:hover{border-color:rgba(200,175,120,.6);color:rgba(200,175,120,.9)}
.ph-empty{display:flex;align-items:center;justify-content:center;width:1080px;height:220px;background:#141414;border:1px dashed #242424;color:rgba(200,175,120,.16);font-size:14px;letter-spacing:.25em}
.bg-el{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;cursor:pointer}
.ov-el{position:absolute;inset:0;pointer-events:none}
.ed{cursor:text;border-radius:2px;outline:2px solid transparent;outline-offset:3px;transition:outline .1s}
.ed:hover{outline:2px solid rgba(200,175,120,.2)}.ed.sel{outline:2px solid rgba(200,175,120,.78)!important}
.deco{cursor:pointer;transition:outline .1s}.deco:hover{outline:2px dashed rgba(200,175,120,.28);outline-offset:3px}.deco.sel{outline:2px dashed rgba(200,175,120,.82)!important;outline-offset:3px}
.safe-guide{position:absolute;top:88px;left:88px;right:88px;bottom:88px;border:1px dashed rgba(100,160,255,.2);pointer-events:none;z-index:999}
.slide-hashtag{position:absolute;top:72px;left:80px;font-family:"Noto Sans TC",sans-serif;font-size:15px;letter-spacing:.15em;color:rgba(200,175,120,.6);z-index:10;pointer-events:none;font-weight:300}
.slide-logo{position:absolute;top:64px;right:80px;width:68px;height:68px;object-fit:contain;z-index:10;pointer-events:none;opacity:.9}
.slide-watermark{position:absolute;bottom:72px;left:50%;transform:translateX(-50%);font-family:"Noto Sans TC",sans-serif;font-size:15px;letter-spacing:.3em;color:rgba(200,175,120,.3);z-index:10;pointer-events:none;white-space:nowrap;font-weight:300}
/* LAYOUT A */
.la-cover{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:160px 100px 120px}
.la-eyebrow{font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:.45em;font-weight:300;color:rgba(200,175,120,.55);margin-bottom:24px}
.la-t1{font-family:"Noto Serif TC",serif;font-weight:900;font-size:96px;line-height:1.0;letter-spacing:.04em;color:var(--tw);display:block;text-shadow:0 4px 40px rgba(0,0,0,.6);word-break:keep-all;margin-bottom:4px}
.la-t2{font-family:"Noto Serif TC",serif;font-weight:900;font-size:96px;line-height:1.0;letter-spacing:.04em;color:var(--red);display:block;text-shadow:0 4px 40px rgba(0,0,0,.6);word-break:keep-all;margin-bottom:28px}
.la-divider{width:80px;height:2px;background:linear-gradient(90deg,rgba(200,175,120,.8),transparent);margin-bottom:28px}
.la-subtitle{font-family:"Noto Serif TC",serif;font-size:26px;letter-spacing:.1em;color:var(--tm);line-height:1.85;margin-bottom:40px}
.la-bio-box{border-top:1px solid rgba(200,175,120,.18);padding-top:24px}
.la-bio-label{font-family:"Noto Sans TC",sans-serif;font-size:13px;letter-spacing:.35em;color:rgba(200,175,120,.5);margin-bottom:12px;font-weight:300}
.la-bio-text{font-family:"Noto Serif TC",serif;font-size:20px;letter-spacing:.07em;color:rgba(220,215,205,.7);line-height:2}
/* LAYOUT B */
.lb-wrap{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:140px 100px}
.lb-tag{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:13px;letter-spacing:.35em;font-weight:300;color:rgba(200,175,120,.6);border:1px solid rgba(200,175,120,.25);padding:5px 16px;margin-bottom:18px}
.lb-heading{font-family:"Noto Serif TC",serif;font-weight:900;font-size:58px;line-height:1.12;letter-spacing:.06em;color:var(--tw);word-break:keep-all;text-shadow:0 2px 20px rgba(0,0,0,.5);margin-bottom:44px}
.lb-cards{display:flex;flex-direction:column;gap:14px}
.lb-card{display:flex;align-items:stretch;background:rgba(200,175,120,.04);border:1px solid rgba(200,175,120,.1);border-left:3px solid rgba(200,175,120,.5);border-radius:0 4px 4px 0;overflow:hidden}
.lb-num{font-family:"Noto Sans TC",sans-serif;font-weight:900;font-size:17px;letter-spacing:.05em;color:rgba(200,175,120,.5);padding:20px 16px 20px 20px;flex-shrink:0;min-width:64px;text-align:center;border-right:1px solid rgba(200,175,120,.08);display:flex;align-items:center;justify-content:center}
.lb-body{padding:16px 20px}
.lb-title{font-family:"Noto Serif TC",serif;font-weight:700;font-size:28px;letter-spacing:.06em;color:var(--tw);line-height:1.3;margin-bottom:6px}
.lb-desc{font-family:"Noto Serif TC",serif;font-size:21px;letter-spacing:.05em;color:var(--tm);line-height:1.75}
/* LAYOUT C */
.lc-wrap{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:130px 100px}
.lc-ey{font-family:"Noto Sans TC",sans-serif;font-size:13px;letter-spacing:.4em;font-weight:300;color:rgba(200,175,120,.4);margin-bottom:8px}
.lc-step{font-family:"Noto Serif TC",serif;font-weight:900;font-size:18px;letter-spacing:.08em;color:rgba(200,175,120,.65);margin-bottom:18px}
.lc-heading{font-family:"Noto Serif TC",serif;font-weight:900;font-size:64px;line-height:1.08;letter-spacing:.04em;color:var(--tw);word-break:keep-all;text-shadow:0 3px 30px rgba(0,0,0,.6);margin-bottom:32px}
.lc-core{background:rgba(200,175,120,.06);border:1px solid rgba(200,175,120,.18);border-radius:4px;padding:20px 24px;margin-bottom:28px}
.lc-core-lbl{font-family:"Noto Sans TC",sans-serif;font-size:12px;letter-spacing:.35em;color:rgba(200,175,120,.45);margin-bottom:8px;font-weight:300}
.lc-core-txt{font-family:"Noto Serif TC",serif;font-size:25px;letter-spacing:.07em;color:var(--tw);line-height:1.8}
.lc-compare{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.lc-col{background:rgba(0,0,0,.3);border:1px solid rgba(200,175,120,.1);border-radius:4px;padding:16px 18px}
.lc-col-lbl{font-family:"Noto Sans TC",sans-serif;font-size:13px;letter-spacing:.3em;color:rgba(200,175,120,.5);margin-bottom:10px;font-weight:300}
.lc-col-item{font-family:"Noto Serif TC",serif;font-size:21px;letter-spacing:.05em;color:var(--tm);line-height:2}
.lc-footer{font-family:"Noto Serif TC",serif;font-size:21px;letter-spacing:.07em;color:rgba(200,175,120,.5);line-height:1.8;border-top:1px solid rgba(200,175,120,.12);padding-top:20px}
/* LAYOUT D */
.ld-wrap{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:130px 100px}
.ld-tag{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:13px;letter-spacing:.35em;font-weight:300;color:rgba(200,175,120,.6);border:1px solid rgba(200,175,120,.25);padding:5px 16px;margin-bottom:20px}
.ld-heading{font-family:"Noto Serif TC",serif;font-weight:900;font-size:56px;line-height:1.12;letter-spacing:.05em;color:var(--tw);word-break:keep-all;margin-bottom:36px}
.ld-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:28px}
.ld-stat{background:rgba(200,175,120,.05);border:1px solid rgba(200,175,120,.12);border-radius:4px;padding:20px 16px;text-align:center}
.ld-stat-num{font-family:"Noto Sans TC",sans-serif;font-weight:900;font-size:52px;letter-spacing:.02em;color:var(--gold);line-height:1;margin-bottom:8px}
.ld-stat-lbl{font-family:"Noto Serif TC",serif;font-size:17px;letter-spacing:.06em;color:var(--ts);line-height:1.6}
.ld-points{display:flex;flex-direction:column;gap:0}
.ld-point{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid rgba(200,175,120,.08)}
.ld-point:last-child{border-bottom:none}
.ld-dot{width:6px;height:6px;background:rgba(200,175,120,.6);border-radius:50%;flex-shrink:0}
.ld-pt{font-family:"Noto Serif TC",serif;font-size:23px;letter-spacing:.06em;color:var(--tm);line-height:1.6}
.ld-footer{font-family:"Noto Serif TC",serif;font-size:21px;letter-spacing:.07em;color:rgba(200,175,120,.5);margin-top:22px;padding-top:20px;border-top:1px solid rgba(200,175,120,.12)}
/* LAYOUT E */
.le-wrap{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:130px 100px}
.le-tag{font-family:"Noto Sans TC",sans-serif;font-size:13px;letter-spacing:.4em;font-weight:300;color:rgba(200,175,120,.5);margin-bottom:12px}
.le-heading{font-family:"Noto Serif TC",serif;font-weight:900;font-size:60px;line-height:1.1;letter-spacing:.05em;color:var(--tw);word-break:keep-all;margin-bottom:40px}
.le-list{display:flex;flex-direction:column;gap:0}
.le-item{display:flex;align-items:flex-start;gap:28px;padding:24px 0;border-bottom:1px solid rgba(200,175,120,.1)}
.le-item:first-child{border-top:1px solid rgba(200,175,120,.1)}
.le-idx{font-family:"Noto Sans TC",sans-serif;font-weight:900;font-size:14px;letter-spacing:.08em;color:rgba(200,175,120,.4);flex-shrink:0;padding-top:5px;width:28px}
.le-item-title{font-family:"Noto Serif TC",serif;font-weight:700;font-size:28px;letter-spacing:.06em;color:var(--tw);line-height:1.3;margin-bottom:6px}
.le-item-desc{font-family:"Noto Serif TC",serif;font-size:21px;letter-spacing:.05em;color:var(--tm);line-height:1.75}
/* LAYOUT F CTA */
.lf-wrap{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:120px 100px}
.lf-dots{font-size:20px;letter-spacing:.6em;color:rgba(200,175,120,.5);margin-bottom:44px}
.lf-main{font-family:"Noto Serif TC",serif;font-weight:900;font-size:80px;line-height:1.1;letter-spacing:.06em;color:var(--tw);word-break:keep-all;text-shadow:0 4px 40px rgba(0,0,0,.7);margin-bottom:28px}
.lf-sub{font-family:"Noto Serif TC",serif;font-size:26px;letter-spacing:.08em;color:var(--tm);line-height:1.9;margin-bottom:52px;max-width:800px}
.lf-vline{width:1px;height:52px;background:linear-gradient(to bottom,rgba(200,175,120,.5),transparent);margin:0 auto 36px}
.lf-cta-box{border:1px solid rgba(200,175,120,.3);padding:16px 52px;margin-bottom:24px}
.lf-cta-txt{font-family:"Noto Serif TC",serif;font-size:30px;letter-spacing:.15em;color:var(--gold)}
.lf-acct{font-family:"Noto Sans TC",sans-serif;font-size:22px;letter-spacing:.25em;color:rgba(200,175,120,.55);font-weight:300}
/* CAPTION */
#caption-box{width:100%;max-width:1220px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:16px 20px;margin-top:16px;display:none}
#caption-box.on{display:block}
.cap-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.cap-title{font-size:13px;letter-spacing:.2em;color:var(--gold)}
.cap-btn{background:transparent;border:1px solid #333;color:rgba(200,175,120,.5);font-family:inherit;font-size:11px;letter-spacing:.1em;padding:4px 10px;cursor:pointer;border-radius:2px;transition:all .12s}
.cap-btn:hover{border-color:var(--gold-d);color:var(--gold)}
#caption-pre{width:100%;background:#0e0e0e;border:1px solid #2a2a2a;border-radius:3px;padding:16px 20px;color:#e0d8c8;font-family:"Noto Serif TC",serif;font-size:13px;letter-spacing:.06em;line-height:2;height:360px;resize:vertical;outline:none}
/* REFINE */
.rpanel{display:none;position:fixed;z-index:99999;background:#1d1d1d;border:1px solid #3a3a3a;border-radius:6px;box-shadow:0 12px 48px rgba(0,0,0,.9);padding:20px;width:360px}
.rp-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.rp-title{font-size:13px;letter-spacing:.2em;color:var(--gold)}
.rp-close{background:transparent;border:none;color:rgba(200,175,120,.4);font-size:18px;cursor:pointer;line-height:1}
.rp-chips{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.rp-chip{background:#111;border:1px solid #2a2a2a;color:rgba(200,175,120,.5);font-family:"Noto Serif TC",serif;font-size:11px;letter-spacing:.12em;padding:7px 12px;cursor:pointer;border-radius:3px;text-align:left;transition:all .15s}
.rp-chip:hover{border-color:var(--gold-d);color:var(--gold);background:#1a1a1a}
.rp-ta{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:3px;color:#e0d8c8;font-family:"Noto Serif TC",serif;font-size:12px;letter-spacing:.06em;padding:10px;outline:none;resize:none;height:80px;line-height:1.7;margin-bottom:10px}
.rp-sub{width:100%;background:var(--gold);color:#0a0a0a;border:none;font-family:"Noto Serif TC",serif;font-size:13px;letter-spacing:.2em;padding:10px;cursor:pointer;border-radius:3px;font-weight:700}
#rp-main{bottom:32px;right:32px}#rp-slide{bottom:32px;left:32px}#rp-cap{bottom:32px;left:420px}
/* STORY */
#story-action-bar{width:100%;max-width:1220px;display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;margin-top:16px}
.sgbtn{font-family:"Noto Serif TC",serif;font-size:11px;letter-spacing:.18em;padding:8px 16px;cursor:pointer;border-radius:3px;transition:all .15s}
#s-ai-btn{background:var(--gold);color:#0a0a0a;border:none;font-weight:700}
#s-gen-btn{background:transparent;color:rgba(200,175,120,.5);border:1px solid #333}#s-gen-btn:hover{border-color:var(--gold-d);color:var(--gold)}
#s-dl-btn{background:transparent;color:var(--gold-d);border:1px solid #383838;display:none}#s-dl-btn:hover{border-color:var(--gold-d);color:var(--gold)}
#s-bg-btn{background:transparent;color:rgba(200,175,120,.4);border:1px solid #2a2a2a}#s-bg-btn:hover{border-color:var(--gold-d);color:var(--gold)}
#s-st{font-size:11px;letter-spacing:.1em;color:rgba(200,175,120,.4)}
#story-wrap{display:flex;flex-direction:row;gap:24px;align-items:flex-start;overflow-x:auto;padding-bottom:20px;width:100%;max-width:1220px}
.spo{display:flex;flex-direction:column;align-items:flex-start;gap:6px;flex-shrink:0}
.spl{font-size:10px;letter-spacing:.18em;color:rgba(200,175,120,.3);padding:0 2px}
.spb{width:360px;height:640px;overflow:hidden;position:relative;background:#0a0a0a;flex-shrink:0}
.sfi{width:1080px;height:1920px;transform:scale(0.3333);transform-origin:top left;position:absolute;top:0;left:0}
.sv-bar{width:100%;max-width:1220px;display:flex;align-items:center;gap:8px;margin-bottom:0}
.sv-btn{font-family:"Noto Serif TC",serif;font-size:11px;letter-spacing:.12em;padding:5px 14px;cursor:pointer;border-radius:2px;transition:all .15s}
</style>
</head>

<script>
/* ══ STATE ══ */
let SEL=null,SMODE='txt',savedSel=null;
let BGU='url("back.png")',storyBGU='url("back.png")';
let lastInput='',lastAccount='',currentData=null,captionTxt='';
let _rsId='',_rsIdx=0,_rsType='';
let regenCount=0;
const E=id=>document.getElementById(id);
const SS=(id,v)=>{const el=E(id);if(el)el.textContent=v};
const SG=(id,v)=>{const el=E(id);if(el)el.value=v};
const stat=m=>{const el=E('st');if(el)el.textContent=m};
function saveKey(v){if(v)localStorage.setItem('groq_key',v)}
function loadKey(){const k=localStorage.getItem('groq_key')||'';if(k){const i=E('groq-key');if(i)i.value=k}return k}
function uploadBg(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{BGU=`url("${ev.target.result}")`;document.querySelectorAll('.bg-el').forEach(b=>b.style.backgroundImage=BGU);stat('✓ 背景已更新')};r.readAsDataURL(f);e.target.value=''}
function uploadStoryBg(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{storyBGU=`url("${ev.target.result}")`;document.querySelectorAll('.s-bg').forEach(b=>b.style.backgroundImage=storyBGU);E('s-st').textContent='✓ 背景已更新'};r.readAsDataURL(f);e.target.value=''}
/* TOOLBAR */
function posTB(e){const tb=E('ftb');const r=e.getBoundingClientRect();let top=r.top-48;if(top<8)top=r.bottom+6;let left=r.left;if(left+760>window.innerWidth-8)left=window.innerWidth-768;if(left<8)left=8;tb.style.top=top+'px';tb.style.left=left+'px';tb.classList.add('on')}
function hideTB(){E('ftb').classList.remove('on')}
function repTB(){if(SEL)posTB(SEL)}
function showTB(e,mode){SEL=e;SMODE=mode;E('gtx').className='gtx'+(mode==='txt'?' on':'');E('gdc').className='gdc'+(mode==='deco'?' on':'');E('gbg').className='gbg'+(mode==='bg'?' on':'');posTB(e);if(mode==='txt')syncTxt(e);else if(mode==='bg')syncBg(e)}
function syncTxt(e){const cs=getComputedStyle(e);const fs=parseFloat(cs.fontSize)||28;const ls=parseFloat(cs.letterSpacing)||0;const lh=parseFloat(cs.lineHeight)||(fs*1.5);SS('vfs',Math.round(fs)+'px');SS('vls',Math.round(ls)+'px');SS('vlh',(Math.round(lh/fs*10)/10).toFixed(1));const rgb=cs.color.match(/[\d.]+/g);if(rgb&&rgb.length>=3)SG('fca','#'+[rgb[0],rgb[1],rgb[2]].map(v=>parseInt(v).toString(16).padStart(2,'0')).join(''));const op=Math.round((parseFloat(e.style.opacity)||1)*100);SG('fop',op);SS('vop',op+'%');E('bb2').classList.toggle('on',cs.fontWeight==='700')}
function syncBg(e){const si=e.closest('.si');const bg=si?.querySelector('.bg-el'),ov=si?.querySelector('.ov-el');if(bg){const v=Math.round((parseFloat(bg.style.opacity)||.9)*100);SG('fbg',v);SS('vbg',v+'%')}if(ov){const v=Math.round((parseFloat(ov.style.opacity)||1)*100);SG('fov',v);SS('vov',v+'%')}}
function saveSel(){const s=window.getSelection();if(s&&s.rangeCount>0&&!s.isCollapsed){savedSel=s.getRangeAt(0).cloneRange();return true}return false}
function restSel(){if(!savedSel)return false;const s=window.getSelection();s.removeAllRanges();s.addRange(savedSel);return true}
E('ftb').addEventListener('mousedown',()=>saveSel());
function fmt(cmd,val){restSel();const sel=window.getSelection();const has=sel&&!sel.isCollapsed&&SEL&&SEL.contains(sel.anchorNode);if(cmd==='b'){if(has)document.execCommand('bold',false,null);else if(SEL){const w=getComputedStyle(SEL).fontWeight;SEL.style.fontWeight=(w==='700'||w==='bold')?'normal':'bold';}E('bb2').classList.toggle('on',getComputedStyle(SEL||document.body).fontWeight==='700')}else if(cmd==='s'){if(has)document.execCommand('strikeThrough',false,null);else if(SEL){const d=getComputedStyle(SEL).textDecoration;SEL.style.textDecoration=d.includes('line-through')?'none':'line-through'}}else if(cmd==='c'&&has){document.execCommand('foreColor',false,val)}}
function adj(prop,val){if(!SEL)return;const cs=getComputedStyle(SEL);if(prop==='fs'){const v=Math.max(8,parseFloat(cs.fontSize)+val);SEL.style.fontSize=v+'px';SS('vfs',Math.round(v)+'px');repTB()}else if(prop==='ls'){const v=parseFloat(cs.letterSpacing)+val;SEL.style.letterSpacing=v+'px';SS('vls',Math.round(v)+'px')}else if(prop==='lh'){const fs=parseFloat(cs.fontSize)||28;const lh=parseFloat(cs.lineHeight)||(fs*1.5);const r=Math.max(.8,Math.round((lh/fs+val)*10)/10);SEL.style.lineHeight=r;SS('vlh',r.toFixed(1))}else if(prop==='col')SEL.style.color=val;else if(prop==='op'){SEL.style.opacity=val/100;SS('vop',val+'%')}}
function da(prop,val){if(!SEL)return;if(prop==='col')SEL.style.borderColor=val;else if(prop==='op'){SEL.style.opacity=val/100;SS('vdo',val+'%')}}
function ba(prop,val){if(!SEL)return;const si=SEL.closest('.si');if(prop==='bg'){const b=si?.querySelector('.bg-el');if(b){b.style.opacity=val/100;SS('vbg',val+'%')}}if(prop==='ov'){const o=si?.querySelector('.ov-el');if(o){o.style.opacity=val/100;SS('vov',val+'%')}}}
function delEl(){if(!SEL)return;hideTB();SEL.remove();SEL=null}
function selEl(e,mode){if(SEL&&SEL!==e)SEL.classList.remove('sel');SEL=e;SMODE=mode;e.classList.add('sel');showTB(e,mode)}
function desel(){if(SEL){SEL.classList.remove('sel');SEL=null}savedSel=null;hideTB()}
document.addEventListener('mousedown',e=>{if(!e.target.closest('.slide')&&!e.target.closest('#ftb')&&!e.target.closest('.rpanel'))desel()});
window.addEventListener('scroll',repTB);
document.addEventListener('keydown',e=>{if(!SEL)return;if(e.key!=='Delete'&&e.key!=='Backspace')return;const inEd=document.activeElement?.getAttribute('contenteditable')==='true';if(!inEd){e.preventDefault();delEl()}});
function setRef(id,txt){E(id).value=txt}
/* ATTACH */
function att(slideEl){
  const si=slideEl.querySelector('.si');
  si.querySelectorAll('.ed').forEach(e=>{
    e.setAttribute('contenteditable','true');e.setAttribute('spellcheck','false');
    e.addEventListener('mousedown',ev=>{ev.stopPropagation();if(SEL===e){setTimeout(()=>showTB(e,'txt'),0);return}selEl(e,'txt')});
    e.addEventListener('mouseup',ev=>{ev.stopPropagation();setTimeout(()=>showTB(e,'txt'),0)});
    e.addEventListener('keydown',ev=>{if(ev.key==='Escape')ev.target.blur()});
    e.addEventListener('input',repTB);
  });
  si.querySelectorAll('.deco').forEach(e=>{e.addEventListener('mousedown',ev=>{ev.stopPropagation();selEl(e,e.classList.contains('bg-el')?'bg':'deco')})});
}
/* HTML HELPERS */
function bgH(){return`<div class="bg-el deco" style="background-image:${BGU};opacity:0.9;background-size:cover;background-position:center"></div>`}
function ovH(){return`<div class="ov-el" style="position:absolute;inset:0;pointer-events:none;background:linear-gradient(160deg,rgba(0,0,0,.22) 0%,rgba(8,6,3,.18) 55%,rgba(0,0,0,.25) 100%)"></div>`}
function olH(acct){const a=acct||E('ai-acct')?.value.trim()||'@angus061855';return`<div class="slide-hashtag">#AS娛樂經紀 大頭</div><img class="slide-logo" src="logo.png" alt="" onerror="this.style.display='none'"><div class="slide-watermark">${a}</div>`}
function fmtDesc(desc){if(!desc)return'';const sents=desc.split(/[。！？\n]/).filter(s=>s.trim());let s1='',s2='';if(sents.length>=2){s1=sents[0].slice(0,25);s2=sents[1].slice(0,25)}else{const full=sents[0]||desc;s1=full.slice(0,25);s2=full.slice(25,50)}return s2.trim()?s1+'<br><span style="font-size:20px;opacity:0.75">'+s2.trim()+'</span>':s1}
const LAYOUTS=['B','C','D','E','C','B','E','D'];
function pickLayout(idx){return LAYOUTS[idx%LAYOUTS.length]}
/* COVER */
function bCover(d,account,pgLabel){
  const parts=(d.title||'').split('\n');const t1=parts[0]||'';const t2=parts[1]||'';
  const pgNum=pgLabel?parseInt(pgLabel.split('/')[0])||1:1;
  const s=document.createElement('div');s.className='slide';s.id='slide-1';
  const si=document.createElement('div');si.className='si';
  si.innerHTML=`${bgH()}${ovH()}${olH(account)}<div class="la-cover" data-idx="${pgNum}"><div class="la-eyebrow ed">${d.eyebrow||'AS娛樂 · 七年經紀人'}</div><span class="la-t1 ed">${t1}</span>${t2?`<span class="la-t2 ed">${t2}</span>`:''}<div class="la-divider deco"></div><div class="la-subtitle ed">${(d.subtitle||'').replace(/\n/g,'<br>')}</div><div class="la-bio-box"><div class="la-bio-label">◆ 關於 大頭 · AS娛樂經紀</div><div class="la-bio-text ed">靠誠實與信任，七年面試超過 <span style="color:rgba(200,175,120,.9);font-weight:700">3000+</span><br>不簽合約・不壓薪水・自由排班・隱私安全<br><span style="color:rgba(200,175,120,.42);font-size:17px">不要讓未來的你 討厭現在的自己</span></div></div></div><div class="safe-guide"></div>`;
  s.appendChild(si);att(s);return s;
}
/* CONTENT */
function bContent(d,idx,total,pgLabel){
  const layout=pickLayout(idx);
  const pgNum=pgLabel?parseInt(pgLabel.split('/')[0])||idx+2:idx+2;
  const pts=d.points||[];
  const slideId=`slide-${idx+2}`;
  const s=document.createElement('div');s.className='slide';s.id=slideId;
  const si=document.createElement('div');si.className='si';
  let inner='';
  if(layout==='B'){
    const cards=pts.map((p,i)=>`<div class="lb-card"><div class="lb-num deco">0${i+1}</div><div class="lb-body"><div class="lb-title ed">${p.title||''}</div><div class="lb-desc ed">${fmtDesc(p.desc||'')}</div></div></div>`).join('');
    inner=`<div class="lb-wrap" data-idx="${pgNum}">${d.tag?`<div class="lb-tag ed">${d.tag}</div>`:''}<div class="lb-heading ed">${(d.heading||'').replace(/\n/g,'<br>')}</div><div class="lb-cards">${cards}</div></div>`;
  } else if(layout==='C'){
    const p0=pts[0]||{},p1=pts[1]||{},p2=pts[2]||{};
    inner=`<div class="lc-wrap" data-idx="${pgNum}"><div class="lc-ey">AS娛樂 · 七年經紀人</div>${d.tag?`<div class="lc-step ed">${d.tag}</div>`:''}<div class="lc-heading ed">${(d.heading||'').replace(/\n/g,'<br>')}</div><div class="lc-core"><div class="lc-core-lbl">CORE IDEA</div><div class="lc-core-txt ed">${p0.title||''}<br><span style="font-size:21px;opacity:.75">${p0.desc||''}</span></div></div><div class="lc-compare"><div class="lc-col"><div class="lc-col-lbl">${p1.title||'重點 01'}</div><div class="lc-col-item ed">${(p1.desc||'').replace(/\n/g,'<br>')}</div></div><div class="lc-col"><div class="lc-col-lbl">${p2.title||'重點 02'}</div><div class="lc-col-item ed">${(p2.desc||'').replace(/\n/g,'<br>')}</div></div></div><div class="lc-footer ed">${d.footer||''}</div></div>`;
  } else if(layout==='D'){
    const statNums=['7年','3000+','0元'];const statLbls=['從業資歷','面試人數','合約費用'];
    const points=pts.map(p=>`<div class="ld-point"><div class="ld-dot deco"></div><div class="ld-pt ed">${p.title||''}${p.desc?'　<span style="opacity:.65;font-size:19px">'+p.desc+'</span>':''}</div></div>`).join('');
          inner=`<div class="ld-wrap" data-idx="${pgNum}">${d.tag?`<div class="ld-tag ed">${d.tag}</div>`:''}<div class="ld-heading ed">${(d.heading||'').replace(/\n/g,'<br>')}</div><div class="ld-stats">${statNums.map((n,i)=>`<div class="ld-stat"><div class="ld-stat-num">${n}</div><div class="ld-stat-lbl">${statLbls[i]}</div></div>`).join('')}</div><div class="ld-points">${points}</div>${d.footer?`<div class="ld-footer ed">${d.footer}</div>`:''}</div>`;
    } else {
      const items=pts.map((p,i)=>`<div class="le-item"><div class="le-idx deco">0${i+1}</div><div><div class="le-item-title ed">${p.title||''}</div><div class="le-item-desc ed">${fmtDesc(p.desc||'')}</div></div></div>`).join('');
      inner=`<div class="le-wrap" data-idx="${pgNum}">${d.tag?`<div class="le-tag ed">${d.tag}</div>`:''}<div class="le-heading ed">${(d.heading||'').replace(/\n/g,'<br>')}</div><div class="le-list">${items}</div></div>`;
    }
    si.innerHTML=`${bgH()}${ovH()}${olH()}${inner}<div class="safe-guide"></div>`;
    s.appendChild(si);att(s);return s;

  async function aiStory(){
    const topic=E('s-topic').value.trim();if(!topic){E('s-st').textContent='請輸入主題';return}
    const key=E('groq-key')?.value.trim()||loadKey();if(!key){E('s-st').textContent='⚠ 請先填入 Groq API Key';return}
    const btn=E('s-ai-btn');btn.disabled=true;E('s-st').textContent='AI 生成中…';
    const prompt=`你是 IG 限時動態文案策略師。只輸出純 JSON，從 { 開始到 } 結束，不加任何說明。
【角色設定】七年娛樂經紀人（男性），踢爆業界黑心手法，說話直接誠實。
【主題】${topic}
輸出格式：{"s1":{"ey":string,"t1":string,"t2":string,"sub":string},"s2":{"tag":string,"hd":string,"p1t":string,"p1d":string,"p2t":string,"p2d":string,"p3t":string,"p3d":string},"s3":{"main":string,"sub":string,"follow":string,"acct":"@angus061855"}}`;
    try{
      const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'meta-llama/llama-4-scout-17b-16e-instruct',max_tokens:1000,messages:[{role:'system',content:'你是 IG 限時動態文案策略師，只輸出純 JSON，不加任何說明。'},{role:'user',content:prompt}]})});
      const j=await r.json();if(j.error)throw new Error(j.error.message);
      const text=j.choices?.[0]?.message?.content||'';
      const s=text.indexOf('{'),e2=text.lastIndexOf('}');if(s===-1||e2===-1)throw new Error('JSON 解析失敗');
      let d;try{d=JSON.parse(text.slice(s,e2+1))}catch(e){throw new Error('JSON 解析失敗')}
      const setV=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v||''};
      if(d.s1){setV('s1-ey',d.s1.ey);setV('s1-t1',d.s1.t1);setV('s1-t2',d.s1.t2);setV('s1-sub',d.s1.sub)}
      if(d.s2){setV('s2-tag',d.s2.tag);setV('s2-hd',d.s2.hd);setV('s2-p1t',d.s2.p1t);setV('s2-p1d',d.s2.p1d);setV('s2-p2t',d.s2.p2t);setV('s2-p2d',d.s2.p2d);setV('s2-p3t',d.s2.p3t);setV('s2-p3d',d.s2.p3d)}
      if(d.s3){setV('s3-main',d.s3.main);setV('s3-sub',d.s3.sub);setV('s3-follow',d.s3.follow);setV('s3-acct',d.s3.acct||'@angus061855')}
      E('s-st').textContent='✓ 內容已填入，渲染中…';buildStory();
    }catch(e){E('s-st').textContent='錯誤：'+e.message}finally{btn.disabled=false}
  }
  async function dlStory(){
    const btn=E('s-dl-btn');btn.disabled=true;E('s-st').textContent='打包中…';
    try{
      if(!window.JSZip){await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s)})}
      const zip=new JSZip();
      for(let i=0;i<3;i++){
        E('s-st').textContent=`處理第 ${i+1}/3 張…`;
        const inner=E('si-'+i);if(!inner)continue;
        const el=inner.firstElementChild;
        el.style.position='absolute';el.style.left='-9999px';el.style.top='0';el.style.transform='none';
        document.body.appendChild(el);
        const canvas=await html2canvas(el,{scale:1,useCORS:true,allowTaint:false,width:1080,height:1920,backgroundColor:'#0a0a0a',logging:false});
        el.style.position='';el.style.left='';el.style.top='';el.style.transform='';
        inner.appendChild(el);
        const blob=await new Promise(res=>canvas.toBlob(res,'image/png'));
        zip.file(`story-${i+1}.png`,blob);
      }
      const zipBlob=await zip.generateAsync({type:'blob'});
      const a=document.createElement('a');a.href=URL.createObjectURL(zipBlob);a.download='ig_stories.zip';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
      E('s-st').textContent='✓ ig_stories.zip 已下載';
    }catch(e){E('s-st').textContent='下載失敗：'+e.message}finally{btn.disabled=false}
  }
