<div class="fst"><button onclick="da('sz',-1)">−</button><span id="vdsz">1</span><button onclick="da('sz',1)">＋</button></div>
<span class="fl" id="dwl" style="display:none">寬</span>
<div class="fst" id="dwc" style="display:none"><button onclick="da('w',-10)">−</button><span id="vdw">64</span><button onclick="da('w',10)">＋</button></div>
<div class="sp"></div>
<button class="fn x" onclick="delEl()">✕</button>
</span>
<span id="gbg">
<span class="fl">背景</span>
<div class="fsl"><input type="range" id="fbg" min="0" max="100" step="1" value="50" oninput="ba('bg',this.value)"/><span id="vbg">50%</span></div>
<div class="sp"></div>
<span class="fl">遮罩</span>
<div class="fsl"><input type="range" id="fov" min="0" max="100" step="1" value="100" oninput="ba('ov',this.value)"/><span id="vov">100%</span></div>
</span>
</div>
<div id="wrap"><div class="ph">輸入內容後按「✦ 產生」</div></div>
<script>
/* ─── data ─── */
const THEMES=[
  {id:'t1',name:'帝王',en:'Imperial',bg:'#0a0a0a',acc:'rgba(200,175,120,1)'},
  {id:'t2',name:'極簡',en:'Minimal',bg:'#080808',acc:'rgba(200,175,120,.6)'},
  {id:'t3',name:'雜誌',en:'Editorial',bg:'#060606',acc:'rgba(200,175,120,.5)'},
  {id:'t4',name:'暗夜',en:'Noir',bg:'#030303',acc:'rgba(200,175,120,1)'},
  {id:'t5',name:'侘寂',en:'Wabi',bg:'#070707',acc:'rgba(200,175,120,.45)'},
  {id:'t6',name:'朱砂',en:'Cinnabar',bg:'#0d0504',acc:'rgba(200,90,60,.75)'},
  {id:'t7',name:'石青',en:'Celadon',bg:'#04070e',acc:'rgba(80,170,215,.65)'},
  {id:'t8',name:'素白',en:'Paper',bg:'#f5f2ec',acc:'rgba(100,75,40,.55)'},
];
let SEL=null,SMODE='txt',savedSel=null;
let BGU='url("back.png")';
let lastInput='',lastAccount='';
let currentData=null;
let globalTheme='t1';
let slideThemes={};
const E=id=>document.getElementById(id);
const SS=(id,v)=>E(id).textContent=v;
const SG=(id,v)=>{E(id).value=v};
const stat=m=>E('st').textContent=m;

/* ─── theme chips ─── */
function buildChips(){
  const c=E('chips');c.innerHTML='';
  THEMES.forEach(t=>{
    const chip=document.createElement('div');
    chip.className='chip'+(t.id===globalTheme?' on':'');
    chip.dataset.tid=t.id;
    chip.onclick=()=>applyGlobalTheme(t.id);
    chip.innerHTML=`<div class="prev" style="background:${t.bg}"><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><div style="width:2px;height:20px;background:${t.acc};border-radius:1px"></div></div></div><span>${t.name}<br>${t.en}</span>`;
    c.appendChild(chip);
  });
}

function applyGlobalTheme(tid){
  globalTheme=tid;
  buildChips();
  if(!currentData)return;
  desel();
  document.querySelectorAll('.si').forEach(si=>{
    const sid=si.closest('.slide')?.id;
    if(sid){slideThemes[sid]=tid;si.className='si '+tid;}
  });
  document.querySelectorAll('.ov-el').forEach(ov=>{
    if(tid==='t8'){ov.style.cssText='position:absolute;inset:0;pointer-events:none;opacity:0'}
    else{ov.style.cssText='position:absolute;inset:0;pointer-events:none;background:linear-gradient(160deg,rgba(0,0,0,.88) 0%,rgba(14,10,6,.7) 50%,rgba(0,0,0,.93) 100%);opacity:1'}
  });
  updateSlideBadges();
  stat('✓ 已套用 '+THEMES.find(t=>t.id===tid).name);
}

function setSlidTheme(slideId,tid){
  slideThemes[slideId]=tid;
  const slide=document.getElementById(slideId);if(!slide)return;
  const si=slide.querySelector('.si');si.className='si '+tid;
  const ov=si.querySelector('.ov-el');
  if(ov){
    if(tid==='t8'){ov.style.cssText='position:absolute;inset:0;pointer-events:none;opacity:0'}
    else{ov.style.cssText='position:absolute;inset:0;pointer-events:none;background:linear-gradient(160deg,rgba(0,0,0,.88) 0%,rgba(14,10,6,.7) 50%,rgba(0,0,0,.93) 100%);opacity:1'}
  }
  updateSlideBadges();desel();
}

function updateSlideBadges(){
  document.querySelectorAll('.slide').forEach(s=>{
    const ctrl=s.querySelector('.slide-controls');if(!ctrl)return;
    const tid=slideThemes[s.id]||globalTheme;
    ctrl.querySelectorAll('.slide-tc').forEach(tc=>tc.classList.toggle('on',tc.dataset.t===tid));
  });
}

/* ─── bg upload ─── */
function uploadBg(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{BGU=`url("${ev.target.result}")`;document.querySelectorAll('.bg-el').forEach(b=>b.style.backgroundImage=BGU);stat('✓ 背景已更新')};
  r.readAsDataURL(f);e.target.value='';
}

/* ─── toolbar ─── */
function posTB(e){
  const tb=E('ftb');
  const r=e.getBoundingClientRect();
  let top=r.top-42+window.scrollY;
  if(top<52)top=r.bottom+6+window.scrollY;
  tb.style.top=Math.max(6,top)+'px';
  tb.style.left=Math.max(6,Math.min(r.left+window.scrollX,window.innerWidth-780))+'px';
  tb.classList.add('on');
}
function hideTB(){E('ftb').classList.remove('on')}
function repTB(){if(SEL)posTB(SEL)}

function showTB(e,mode){
  SEL=e;SMODE=mode;
  E('gtx').className='gtx'+(mode==='txt'?' on':'');
  E('gdc').className='gdc'+(mode==='deco'?' on':'');
  E('gbg').className='gbg'+(mode==='bg'?' on':'');
  posTB(e);
  if(mode==='txt')syncTxt(e);
  else if(mode==='deco')syncDeco(e);
  else if(mode==='bg')syncBg(e);
}

function syncTxt(e){
  const cs=getComputedStyle(e);
  const fs=parseFloat(cs.fontSize)||28;
  const ls=parseFloat(cs.letterSpacing)||0;
  const lh=parseFloat(cs.lineHeight)||(fs*1.5);
  SS('vfs',Math.round(fs)+'px');
  SS('vls',Math.round(ls)+'px');
  SS('vlh',(Math.round(lh/fs*10)/10).toFixed(1));
  const rgb=cs.color.match(/[\d.]+/g);
  if(rgb&&rgb.length>=3)SG('fca','#'+[rgb[0],rgb[1],rgb[2]].map(v=>parseInt(v).toString(16).padStart(2,'0')).join(''));
  const op=Math.round((parseFloat(e.style.opacity)||1)*100);
  SG('fop',op);SS('vop',op+'%');
  E('bb2').classList.toggle('on',cs.fontWeight==='700');
  E('bs2').classList.toggle('on',cs.textDecoration.includes('line-through'));
}

function dType(e){
  const c=(e.className||'').toString();
  if(c.includes('corner'))return 'corner';
  if(c.trim().split(' ').includes('hl'))return 'hl';
  if(c.trim().split(' ').includes('vl'))return 'vl';
  if(c.includes('sb2'))return 'sb2';
  if(c.includes('rl'))return 'rl';
  if(c.includes('sp2'))return 'sp2';
  if(c.includes('dv'))return 'dv';
  if(c.includes('cv'))return 'cv';
  if(c.includes('nm'))return 'num';
  if(c.includes('cd'))return 'dots';
  if(c.includes('pn'))return 'pnum';
  if(c.includes('cb'))return 'cbox';
  return 'other';
}

function syncDeco(e){
  const t=dType(e);
  const lm={corner:'角框',hl:'橫線',vl:'直線',sb2:'側邊條',rl:'右側條',sp2:'分隔線',dv:'分隔線',cv:'垂直線',num:'頁碼',dots:'裝飾點',pnum:'序號',cbox:'邊框',other:'裝飾'};
  SS('dlbl',lm[t]||'裝飾');
  const cs=getComputedStyle(e);
  const op=Math.round((parseFloat(e.style.opacity)||1)*100);
  SG('fdo',op);SS('vdo',op+'%');
  const isT=['num','dots','pnum'].includes(t);
  const isL=['hl','vl','sp2','dv','cv','sb2','rl'].includes(t);
  let hex='#c8af78';
  if(isT){const rgb=cs.color.match(/[\d.]+/g);if(rgb&&rgb.length>=3)hex='#'+[rgb[0],rgb[1],rgb[2]].map(v=>parseInt(v).toString(16).padStart(2,'0')).join('');}
  else if(isL){const rgb=(cs.backgroundColor||'').match(/[\d.]+/g);if(rgb&&rgb.length>=3)hex='#'+[rgb[0],rgb[1],rgb[2]].map(v=>parseInt(v).toString(16).padStart(2,'0')).join('');}
  else if(t==='corner'||t==='cbox'){const rgb=cs.borderTopColor.match(/[\d.]+/g);if(rgb&&rgb.length>=3)hex='#'+[rgb[0],rgb[1],rgb[2]].map(v=>parseInt(v).toString(16).padStart(2,'0')).join('');}
  SG('fdc',hex);
  const sz=isT?Math.round(parseFloat(cs.fontSize)||16):t==='corner'?Math.round(parseFloat(cs.borderTopWidth)||1):1;
  SS('vdsz',sz);
  const sw=['sp2','dv','hl'].includes(t);
  E('dwl').style.display=sw?'':'none';
  E('dwc').style.display=sw?'flex':'none';
  if(sw)SS('vdw',Math.round(parseFloat(cs.width)||64));
}

function syncBg(e){
  const si=e.closest('.si');
  const bg=si?.querySelector('.bg-el'),ov=si?.querySelector('.ov-el');
  if(bg){const v=Math.round((parseFloat(bg.style.opacity)||.5)*100);SG('fbg',v);SS('vbg',v+'%')}
  if(ov){const v=Math.round((parseFloat(ov.style.opacity)||1)*100);SG('fov',v);SS('vov',v+'%')}
}

function saveSel(){const s=window.getSelection();if(s&&s.rangeCount>0&&!s.isCollapsed){savedSel=s.getRangeAt(0).cloneRange();return true}return false}
function restSel(){if(!savedSel)return false;const s=window.getSelection();s.removeAllRanges();s.addRange(savedSel);return true}
E('ftb').addEventListener('mousedown',()=>saveSel());

function fmt(cmd,val){
  restSel();
  const sel=window.getSelection();
  const has=sel&&!sel.isCollapsed&&SEL&&SEL.contains(sel.anchorNode);
  if(cmd==='b'){
    if(has)document.execCommand('bold',false,null);
    else if(SEL){const w=getComputedStyle(SEL).fontWeight;SEL.style.fontWeight=(w==='700'||w==='bold')?'normal':'bold';}
    E('bb2').classList.toggle('on',getComputedStyle(SEL||document.body).fontWeight==='700');
  }else if(cmd==='s'){
    if(has)document.execCommand('strikeThrough',false,null);
    else if(SEL){const d=getComputedStyle(SEL).textDecoration;SEL.style.textDecoration=d.includes('line-through')?'none':'line-through';}
    E('bs2').classList.toggle('on',getComputedStyle(SEL||document.body).textDecoration.includes('line-through'));
  }else if(cmd==='c'&&has){document.execCommand('foreColor',false,val);}
}

function adj(prop,val){
  if(!SEL)return;
  const cs=getComputedStyle(SEL);
  if(prop==='fs'){const v=Math.max(8,parseFloat(cs.fontSize)+val);SEL.style.fontSize=v+'px';SS('vfs',Math.round(v)+'px');repTB()}
  else if(prop==='ls'){const v=parseFloat(cs.letterSpacing)+val;SEL.style.letterSpacing=v+'px';SS('vls',Math.round(v)+'px')}
  else if(prop==='lh'){const fs=parseFloat(cs.fontSize)||28;const lh=parseFloat(cs.lineHeight)||(fs*1.5);const r=Math.max(.8,Math.round((lh/fs+val)*10)/10);SEL.style.lineHeight=r;SS('vlh',r.toFixed(1))}
  else if(prop==='col')SEL.style.color=val;
  else if(prop==='op'){SEL.style.opacity=val/100;SS('vop',val+'%')}
}

function da(prop,val){
  if(!SEL)return;
  const t=dType(SEL);
  const isT=['num','dots','pnum'].includes(t);
  const isL=['hl','vl','sp2','dv','cv','sb2','rl'].includes(t);
  if(prop==='col'){
    if(isT)SEL.style.color=val;
    else if(isL){SEL.style.background=val;SEL.style.backgroundColor=val;}
    else if(t==='corner'||t==='cbox')SEL.style.borderColor=val;
  }else if(prop==='op'){SEL.style.opacity=val/100;SS('vdo',val+'%')}
  else if(prop==='sz'){
    if(isT){const v=Math.max(8,parseFloat(getComputedStyle(SEL).fontSize)+val);SEL.style.fontSize=v+'px';SS('vdsz',Math.round(v))}
    else if(t==='corner'){const bw=Math.max(1,(parseFloat(SEL.style.borderTopWidth)||1)+val);SEL.style.borderWidth=bw+'px';SS('vdsz',Math.round(bw));}
    else if(isL){const p=['hl','sp2','dv'].includes(t)?'height':'width';const v=Math.max(1,(parseFloat(SEL.style[p])||1)+val);SEL.style[p]=v+'px';SS('vdsz',Math.round(v))}
  }else if(prop==='w'){const v=Math.max(10,(parseFloat(getComputedStyle(SEL).width)||64)+val);SEL.style.width=v+'px';SS('vdw',Math.round(v))}
}

function ba(prop,val){
  if(!SEL)return;
  const si=SEL.closest('.si');
  if(prop==='bg'){const b=si?.querySelector('.bg-el');if(b){b.style.opacity=val/100;SS('vbg',val+'%')}}
  if(prop==='ov'){const o=si?.querySelector('.ov-el');if(o){o.style.opacity=val/100;SS('vov',val+'%')}}
}

function delEl(){if(!SEL)return;hideTB();SEL.remove();SEL=null;}

function selEl(e,mode){
  if(SEL&&SEL!==e)SEL.classList.remove('sel');
  SEL=e;SMODE=mode;e.classList.add('sel');showTB(e,mode);
}
function desel(){
  if(SEL){SEL.classList.remove('sel');SEL=null;}
  savedSel=null;hideTB();
}
document.addEventListener('mousedown',e=>{
  if(!e.target.closest('.slide')&&!e.target.closest('#ftb')&&!e.target.closest('#tbar'))desel();
});
window.addEventListener('scroll',repTB);
document.addEventListener('keydown',e=>{
  if(!SEL)return;
  if(e.key!=='Delete'&&e.key!=='Backspace')return;
  const inEd=document.activeElement?.getAttribute('contenteditable')==='true';
  if(!inEd){e.preventDefault();delEl();}
});

function att(slideEl){
  const si=slideEl.querySelector('.si');
  si.querySelectorAll('.ed').forEach(e=>{
    e.setAttribute('contenteditable','true');
    e.setAttribute('spellcheck','false');
    e.addEventListener('mousedown',ev=>{
      ev.stopPropagation();
      if(SEL===e){setTimeout(()=>showTB(e,'txt'),0);return;}
      selEl(e,'txt');
    });
    e.addEventListener('mouseup',ev=>{ev.stopPropagation();setTimeout(()=>showTB(e,'txt'),0)});
    e.addEventListener('keydown',ev=>{if(ev.key==='Escape')ev.target.blur()});
    e.addEventListener('input',repTB);
  });
  si.querySelectorAll('.deco').forEach(e=>{
    e.addEventListener('mousedown',ev=>{
      ev.stopPropagation();
      selEl(e,e.classList.contains('bg-el')?'bg':'deco');
    });
  });
}

function mkControls(slideId){
  const ctrl=document.createElement('div');ctrl.className='slide-controls';
  const lbl=document.createElement('span');lbl.className='slide-theme-label';lbl.textContent='此頁風格';
  ctrl.appendChild(lbl);
  THEMES.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='slide-tc'+(t.id===globalTheme?' on':'');
    btn.dataset.t=t.id;btn.textContent=t.name;
    btn.onclick=()=>setSlidTheme(slideId,t.id);
    ctrl.appendChild(btn);
  });
  return ctrl;
}

/* ─── HTML builders ─── */
function bgD(thm){
  const opq=thm==='t8'?'.9':'.85';
  return`<div class="bg-el deco" style="background-image:${BGU};opacity:${opq}"></div>`;
}
function ovD(thm){
  if(thm==='t8')return`<div class="ov-el" style="position:absolute;inset:0;pointer-events:none;opacity:0"></div>`;
  return`<div class="ov-el" style="position:absolute;inset:0;pointer-events:none;background:linear-gradient(160deg,rgba(0,0,0,.55) 0%,rgba(14,10,6,.4) 50%,rgba(0,0,0,.65) 100%);opacity:1"></div>`;
}

/* ✅ 修正：ovD2 補回來 */
function bgD2(thm){return`<div class="bg-el deco" style="background-image:${BGU};opacity:${thm==='t8'?'.9':'.85'}"></div>`}
function ovD2(thm){
  if(thm==='t8')return`<div class="ov-el" style="position:absolute;inset:0;pointer-events:none;opacity:0"></div>`;
  return`<div class="ov-el" style="position:absolute;inset:0;pointer-events:none;background:linear-gradient(160deg,rgba(0,0,0,.55) 0%,rgba(14,10,6,.4) 50%,rgba(0,0,0,.65) 100%);opacity:1"></div>`;
}

function acctExtra(thm,account){
  return thm==='t3'?`<div class="ac2 ed">${account}</div>`:'';
}

function mkSlide(id,thm,innerHtml){
  const s=document.createElement('div');s.className='slide';s.id=id;
  s.appendChild(mkControls(id));
  const si=document.createElement('div');si.className=`si ${thm}`;
  si.innerHTML=innerHtml;s.appendChild(si);att(s);
  slideThemes[id]=thm;
  return s;
}

function bCover(d,account,thm){
  const ch=[...(d.title||'')];const mid=Math.ceil(ch.length/2);
  return mkSlide('slide-1',thm,`${bgD(thm)}${ovD(thm)}${acctExtra(thm,account)}
    <div class="cw">
      <div class="ey ed">${d.eyebrow||''}</div>
      <div><span class="tt ed">${ch.slice(0,mid).join('')}</span><span class="tt ac ed">${ch.slice(mid).join('')}</span></div>
      <div class="sp2 deco"></div>
      <div class="sb ed">${(d.subtitle||'').replace(/\n/g,'<br>')}</div>
      <div class="ac2 ed">${account}</div>
    </div>`);
}

function bContent(d,idx,total,thm){
  const num=String(idx+1).padStart(2,'0')+' / '+String(total).padStart(2,'0');
  const pts=(d.points||[]).map((p,i)=>`
    <li class="pi">
      <span class="pn deco">0${i+1}</span>
      <div><div class="ph2 ed">${p.title||''}</div><div class="pd ed">${p.desc||''}</div></div>
    </li>`).join('');
  return mkSlide(`slide-${idx+2}`,thm,`${bgD(thm)}${ovD(thm)}
    <div class="nw">
      <div class="nm deco">${num}</div>
      <div class="tg ed">${d.tag||''}</div>
      <div class="hd ed">${(d.heading||'').replace(/\n/g,'<br>')}</div>
      <div class="dv deco"></div>
      <ul class="pl">${pts}</ul>
    </div>`);
}

function bCta(d,account,idx,thm){
  return mkSlide(`slide-${idx+2}`,thm,`${bgD(thm)}${ovD(thm)}
    <div class="ctw">
      <div class="cd deco">◆ ◆ ◆</div>
      <div class="cm ed">${(d.main||'').replace(/\n/g,'<br>')}</div>
      <div class="cs ed">${(d.sub||'').replace(/\n/g,'<br>')}</div>
      <div class="cv deco"></div>
      <div class="cb deco"><div class="cf ed">${d.follow||''}</div></div>
      <div class="ca ed">${account}</div>
    </div>`);
}

/* ✅ 修正：fixLineBreaks 防止詞語中間換行 */
function fixLineBreaks(data){
  function fix(str){
    if(typeof str!=='string')return str;
    return str.replace(/([^\s，。！？、：；\n])\n([^\s，。！？、：；])/g,'$1$2');
  }
  function walk(obj){
    if(!obj)return obj;
    if(typeof obj==='string')return fix(obj);
    if(Array.isArray(obj))return obj.map(walk);
    const r={};for(const k in obj)r[k]=walk(obj[k]);return r;
  }
  return walk(data);
}

function render(data,account,thm){
  currentData=data;
  const wrap=E('wrap');wrap.innerHTML='';
  slideThemes={};
  const cnt=data.content||[];
  const hasSummary=!!(data.summary&&data.summary.heading);
  wrap.appendChild(bCover(data.cover,account,thm));
  cnt.forEach((c,i)=>wrap.appendChild(bContent(c,i,cnt.length,thm)));
  if(hasSummary)wrap.appendChild(bContent(data.summary,cnt.length,cnt.length+1,thm));
  wrap.appendChild(bCta(data.cta,account,hasSummary?cnt.length+1:cnt.length,thm));
  E('db').style.display='block';E('db2').style.display='block';E('rgb').style.display='block';
  E('tbar').style.display='block';
  buildChips();updateSlideBadges();
}

/* ─── API ─── */
/* ✅ 修正：只保留一個 buildPrompt，移除重複定義 */
function buildPrompt(topic,cfg){
  const modeHints={
    safe:'語氣溫和，用觀念引導，不要太直接',
    balance:'有衝突感，打臉但不過激，保持可發佈',
    aggressive:'非常直接，大量打臉，語氣犀利，讓人不舒服但停不下來'
  };
  const hint=modeHints[cfg.mode]||modeHints.balance;
  return '【強制換行規則】所有 \\n 只能在語意完整的斷點換行，禁止在同一個詞語中間換行。\n'
    +'正確："你以為你了解\\n酒店公關"　錯誤："你以為你了\\n解酒店公關"\n\n'
    +'你是專業IG輪播文案策略師，只輸出JSON，從 { 開始，不輸出任何其他文字。\n'
    +'語氣要求：'+hint+'\n'
    +'衝突強度：'+cfg.intensity+'（0保守～1最強）\n'
    +'揭露程度：'+cfg.revealLevel+'（0模糊～1直接）\n'
    +'規則：\n'
    +'1. 每頁都要有衝突感或反轉\n'
    +'2. 至少2頁含反問句\n'
    +'3. 至少2頁含打臉句（直接否定常見認知）\n'
    +'4. 多用對比（你以為 vs 其實）\n'
    +'5. 禁止明確金額、過度露骨描述\n'
    +'6. content 固定4~5個，每個固定3個 points\n'
    +'7. 每頁字數要短，適合滑動閱讀\n'
    +'主題：'+topic+'\n'
    +'輸出格式：\n'
    +'{"cover":{"eyebrow":"3~5英文關鍵詞·用·分隔·全大寫","title":"4~8字大標題","subtitle":"副標第一行\\n副標第二行"},'
    +'"content":[{"tag":"2~4字類別標籤","heading":"標題第一行\\n標題第二行","points":[{"title":"5~10字重點標題","desc":"20~35字具體說明，要有畫面感＋帶情緒"},{"title":"","desc":""},{"title":"","desc":""}]}],'
    +'"summary":{"tag":"核心觀念","heading":"反轉第一行\\n反轉第二行","points":[{"title":"打臉句","desc":"否定常見錯誤觀念"},{"title":"","desc":""},{"title":"","desc":""}]},'

}

const FSYS='你是版面填充機器，只輸出JSON，從{開始，不輸出任何其他文字。{"cover":{"eyebrow":"TOPIC · INSIGHT · ANALYSIS","title":"主題標題","subtitle":"副標第一行\\n副標第二行"},"content":[{"tag":"背景","heading":"背景\\n概述","points":[{"title":"重點一","desc":"說明二十字以內"},{"title":"重點二","desc":"說明二十字"},{"title":"重點三","desc":"說明二十字"}]},{"tag":"現況","heading":"現況\\n分析","points":[{"title":"現況一","desc":"說明"},{"title":"現況二","desc":"說明"},{"title":"現況三","desc":"說明"}]},{"tag":"觀察","heading":"深度\\n觀察","points":[{"title":"觀察一","desc":"說明"},{"title":"觀察二","desc":"說明"},{"title":"觀察三","desc":"說明"}]}],"summary":{"tag":"核心觀念","heading":"問題不在你\\n在選擇","points":[{"title":"打臉句","desc":"你不是做不起來，是一開始就錯了"},{"title":"重點二","desc":"說明"},{"title":"重點三","desc":"說明"}]},"cta":{"main":"深入了解\\n更多內容","sub":"每週更新深度內容\\n追蹤掌握第一手資訊","follow":"追蹤帳號獲取最新資訊"}}';

function saveKey(v){if(v)localStorage.setItem('groq_key',v);}
function loadKey(){
  const k=localStorage.getItem('groq_key')||'';
  if(k){const inp=document.getElementById('groq-key');if(inp)inp.value=k;}
  return k;
}

function getCfg(){
  return{
    mode:document.getElementById('cfg-mode')?.value||'balance',
    intensity:parseFloat(document.getElementById('cfg-int')?.value||0.7),
    revealLevel:parseFloat(document.getElementById('cfg-rev')?.value||0.5),
  };
}

/* ✅ 修正：callAPI 明確使用 buildPrompt，不傳 null */
async function callAPI(inp,sys,max){
  const key=document.getElementById('groq-key')?.value.trim()||loadKey();
  if(!key){stat('⚠ 請先填入 Groq API Key');throw new Error('No API key');}
  const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({
      model:'llama-3.3-70b-versatile',
      max_tokens:max||2000,
      messages:[
        {role:'system',content:sys},
        {role:'user',content:inp}
      ]
    })
  });
  const j=await r.json();
  if(j.error)throw new Error(j.error.message||'Groq error');
  return j.choices?.[0]?.message?.content||'';
}

function parseJSON(text){
  const s=text.indexOf('{'),e2=text.lastIndexOf('}');
  if(s===-1||e2===-1)return null;
  try{return JSON.parse(text.slice(s,e2+1))}catch(e){return null}
}

/* ✅ 修正：doGen 明確傳入 buildPrompt，備用改用 FSYS */
async function doGen(){
  const inp=E('it').value.trim();
  const account=E('ai').value.trim()||'@your.account';
  if(!inp){stat('請輸入主題或文章');return}
  lastInput=inp;lastAccount=account;
  E('gb').disabled=true;stat('AI 規劃中…');desel();
  try{
    const cfg=getCfg();
    let text=await callAPI(inp,buildPrompt(inp,cfg),2000);
    let data=parseJSON(text);
    if(!data){
      stat('備用方案中…');
      text=await callAPI(inp,FSYS,1500);
      data=parseJSON(text);
    }
    if(!data){stat('⚠ 生成失敗，請換個說法');return;}
    render(fixLineBreaks(data),account,globalTheme);
    stat('✓ 完成 · 點選元素編輯 · 上方切換整體風格 · 每張右上可單獨換');
  }catch(e){stat('錯誤：'+e.message);console.error(e)}
  finally{E('gb').disabled=false}
}

/* ✅ 修正：reGen 也使用 buildPrompt，備用改用 FSYS */
let regenCount=0;
async function reGen(){
  if(!lastInput){stat('請先產生一次內容');return;}
  regenCount++;
  const btn=E('rgb');btn.disabled=true;E('gb').disabled=true;
  stat(`重新生成第 ${regenCount} 個版本…`);desel();
  const variations=[
    '\n\n請用完全不同的切入角度、不同的標題和重點，重新規劃這個主題。',
    '\n\n這次從「常見誤解」的角度切入，打破錯誤認知。',
    '\n\n這次用「數字說話」，盡量加入具體數字、金額、比例。',
    '\n\n這次從「新手常犯的錯」角度切入，列出會吃虧的決策。',
    '\n\n這次語氣更直接犀利，用更強烈的對比和反問。',
    '\n\n這次從「老手才知道」的內行視角切入，強調只有圈內人才懂的事。',
  ];
  const hint=variations[(regenCount-1)%variations.length];
  const modifiedInput=lastInput+hint;
  try{
    const cfg=getCfg();
    let text=await callAPI(modifiedInput,buildPrompt(modifiedInput,cfg),2000);
    let data=parseJSON(text);
    if(!data){
      text=await callAPI(modifiedInput,FSYS,1500);
      data=parseJSON(text);
    }
    if(!data){stat('⚠ 重新生成失敗，再試一次');return;}
    render(fixLineBreaks(data),lastAccount,globalTheme);
    stat(`✓ 第 ${regenCount} 個版本 · 不滿意繼續按「↻ 換個版本」`);
  }catch(e){stat('錯誤：'+e.message);}
  finally{btn.disabled=false;E('gb').disabled=false;}
}

/* ─── download ─── */
async function renderSlideCanvas(si){
  si.querySelectorAll('.ed,.deco').forEach(e=>e.style.outline='none');
  const c=await html2canvas(si,{scale:1,useCORS:true,allowTaint:true,width:1080,height:1350,backgroundColor:'#0a0a0a',logging:false});
  si.querySelectorAll('.ed,.deco').forEach(e=>e.style.outline='');
  return c;
}

async function dlAll(){
  const slides=document.querySelectorAll('.slide');if(!slides.length)return;
  desel();const btn=E('db');btn.disabled=true;stat('打包中，請稍候…');
  try{
    if(!window.JSZip){
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
        s.onload=res;s.onerror=rej;document.head.appendChild(s);
      });
    }
    const zip=new JSZip();
    for(let i=0;i<slides.length;i++){
      stat(`處理第 ${i+1} / ${slides.length} 張…`);
      const si=slides[i].querySelector('.si');
      const canvas=await renderSlideCanvas(si);
      const blob=await new Promise(res=>canvas.toBlob(res,'image/png'));
      zip.file(`slide-${i+1}.png`,blob);
    }
    stat('壓縮中…');
    const zipBlob=await zip.generateAsync({type:'blob'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(zipBlob);a.download='ig_slides.zip';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(a.href);stat('✓ ig_slides.zip 已下載');
  }catch(e){stat('下載失敗：'+e.message);console.error(e);}
  finally{btn.disabled=false;}
}

async function dlOne(){
  const slides=document.querySelectorAll('.slide');if(!slides.length)return;
  desel();const btn=E('db2');btn.disabled=true;
  for(let i=0;i<slides.length;i++){
    stat(`第 ${i+1}/${slides.length} 張`);
    const si=slides[i].querySelector('.si');
    const canvas=await renderSlideCanvas(si);
    const a=document.createElement('a');
    a.download=`slide-${i+1}.png`;a.href=canvas.toDataURL('image/png');
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    await new Promise(r=>setTimeout(r,1200));
  }
  stat('✓ 全部完成');btn.disabled=false;
}

/* ─── MANUAL MODE ─── */
let currentMode='ai';
let slideCount2=0;
let slideIds2=[];

function setMode(mode){
  currentMode=mode;
  document.getElementById('ai-panel').classList.toggle('hidden',mode!=='ai');
  document.getElementById('manual-panel').classList.toggle('hidden',mode!=='manual');
  document.getElementById('mbtn-ai').className='mode-btn '+(mode==='ai'?'on':'off');
  document.getElementById('mbtn-manual').className='mode-btn '+(mode==='manual'?'on':'off');
  if(mode==='manual'&&document.querySelectorAll('.slide').length===0)initDefault();
}

const SLIDE_TYPES=[{key:'cover',label:'封面'},{key:'content',label:'內容'},{key:'cta',label:'結尾CTA'}];

function coverHTML2(thm,d){
  d=d||{ey:'TOPIC · INSIGHT · REALITY',t1:'主題',t2:'大標',sb:'點出核心問題\n一句話說清楚',ac:'@your.account'};
  const extra=thm==='t3'?`<div class="ac2 ed">${d.ac}</div>`:'';
  return`${bgD2(thm)}${ovD2(thm)}${extra}
    <div class="cw">
      <div class="ey ed">${d.ey}</div>
      <div><span class="tt ed">${d.t1}</span><span class="tt ac ed">${d.t2}</span></div>
      <div class="sp2 deco"></div>
      <div class="sb ed">${(d.sb||'').replace(/\n/g,'<br>')}</div>
      <div class="ac2 ed">${d.ac}</div>
    </div>`;
}

function contentHTML2(thm,d,idx,total){
  d=d||{tg:'類別',hd:'標題',pts:[{t:'重點一',d:'說明文字'},{t:'重點二',d:'說明文字'},{t:'重點三',d:'說明文字'}]};
  const num=String(idx+1).padStart(2,'0')+' / '+String(total||3).padStart(2,'0');
  const pts=(d.pts||[]).map((p,i)=>`
    <li class="pi"><span class="pn deco">0${i+1}</span>
      <div><div class="ph2 ed">${p.t}</div><div class="pd ed">${p.d}</div></div></li>`).join('');
  return`${bgD2(thm)}${ovD2(thm)}
    <div class="nw">
      <div class="nm deco">${num}</div>
      <div class="tg ed">${d.tg}</div>
      <div class="hd ed">${(d.hd||'').replace(/\n/g,'<br>')}</div>
      <div class="dv deco"></div>
      <ul class="pl">${pts}</ul>
    </div>`;
}

function ctaHTML2(thm,d){
  d=d||{cm:'行動呼籲',cs:'說清楚私訊能得到什麼\n不要模糊',cf:'追蹤帳號獲取更多',ca:'@your.account'};
  return`${bgD2(thm)}${ovD2(thm)}
    <div class="ctw">
      <div class="cd deco">◆ ◆ ◆</div>
      <div class="cm ed">${(d.cm||'').replace(/\n/g,'<br>')}</div>
      <div class="cs ed">${(d.cs||'').replace(/\n/g,'<br>')}</div>
      <div class="cv deco"></div>
      <div class="cb deco"><div class="cf ed">${d.cf||''}</div></div>
      <div class="ca ed">${d.ca||''}</div>
    </div>`;
}

function addSlide(type,data,thm){
  type=type||'content';thm=thm||globalTheme;
  slideCount2++;
  const id='mslide-'+slideCount2;
  slideIds2.push(id);
  const outer=document.createElement('div');outer.className='slide-outer';outer.id='outer-'+id;
  const bar=document.createElement('div');bar.className='slide-bar';
  bar.innerHTML=`<span class="slbl">第${document.querySelectorAll('.slide').length+1}張</span>`;
  SLIDE_TYPES.forEach(st=>{
    const btn=document.createElement('button');
    btn.className='slide-tc'+(st.key===type?' on':'');
    btn.textContent=st.label;btn.dataset.stype=st.key;
    btn.onclick=()=>changeSlideType2(id,st.key,bar);
    bar.appendChild(btn);
  });
  const tlbl=document.createElement('span');tlbl.className='slbl';tlbl.style.marginLeft='6px';tlbl.textContent='風格';
  bar.appendChild(tlbl);
  THEMES.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='slide-tc'+(t.id===thm?' on':'');
    btn.textContent=t.name;btn.dataset.t=t.id;
    btn.onclick=()=>{
      const si=document.querySelector('#'+id+' .si');if(!si)return;
      si.className='si '+t.id;
      const ov=si.querySelector('.ov-el');if(ov)ov.style.opacity=t.id==='t8'?'0':'1';
      bar.querySelectorAll('.slide-tc[data-t]').forEach(b=>b.classList.toggle('on',b.dataset.t===t.id));
      desel();
    };
    bar.appendChild(btn);
  });
  const delBtn=document.createElement('button');delBtn.className='del-slide';delBtn.textContent='✕ 刪除此頁';
  delBtn.onclick=()=>{outer.remove();slideIds2=slideIds2.filter(x=>x!==id);updateMCount();};
  bar.appendChild(delBtn);
  outer.appendChild(bar);
  const slide=document.createElement('div');slide.className='slide';slide.id=id;
  const si=document.createElement('div');si.className='si '+thm;
  si.innerHTML=type==='cover'?coverHTML2(thm,data):type==='cta'?ctaHTML2(thm,data):contentHTML2(thm,data,0,3);
  slide.appendChild(si);outer.appendChild(slide);
  E('wrap').appendChild(outer);
  att(slide);updateMCount();
  E('db').style.display='block';E('db2').style.display='block';
}

function changeSlideType2(id,newType,bar){
  const slide=document.getElementById(id);if(!slide)return;
  const si=slide.querySelector('.si');
  const thm=[...si.classList].find(c=>c.startsWith('t')&&c.length<=2)||globalTheme;
  si.innerHTML=newType==='cover'?coverHTML2(thm):newType==='cta'?ctaHTML2(thm):contentHTML2(thm,null,0,3);
  att(slide);
  bar.querySelectorAll('.slide-tc[data-stype]').forEach(b=>b.classList.toggle('on',b.dataset.stype===newType));
  desel();
}

function updateMCount(){
  const n=document.querySelectorAll('.slide').length;
  const el=document.getElementById('slides-count');if(el)el.textContent=n+' 張';
}

function initDefault(){
  document.querySelectorAll('.slide-outer').forEach(o=>o.remove());
  slideIds2=[];slideCount2=0;
  addSlide('cover');
  addSlide('content');
  addSlide('content');
  addSlide('content');
  addSlide('cta');
}

loadKey();

document.getElementById('cfg-rev')?.addEventListener('input',function(){document.getElementById('v-rev').textContent=this.value;});
